<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DigiVpet">
<title>Digimon V-Pet 顯示控制器</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="Logo-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="Logo-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="Logo-512.png">
<link rel="apple-touch-icon" sizes="192x192" href="Logo-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="Logo-512.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{
  background:#111;
  padding:16px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
.title{color:#fff;text-align:center;margin-bottom:16px;font-size:20px}

/* 主LCD螢幕 */
.main-screen{
  background:#000;
  border:3px solid #666;
  width:192px;
  height:96px;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  cursor:pointer;
  display:block;
  margin:0 auto 16px;
}

/* 左右切換箭頭 */
.nav-bar{
  display:flex;
  justify-content:center;
  gap:24px;
  margin-bottom:30px;
}
.arrow-btn{
  width:80px;height:50px;
  font-size:26px;
  background:#333;
  color:#fff;
  border:none;
  border-radius:8px;
}

/* 中間8個功能按鈕 */
.btn-panel{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:auto;
}
.func-btn{
  height:60px;
  background:#333;
  border:none;
  border-radius:8px;
  color:#fff;
  font-size:14px;
}
.func-btn.active{
  background:#c42222;
  color:#fff;
  font-weight:700;
}

/* 頁面最底部導航欄 */

/* 狀態面板（按鈕下方） */
.stats-display{
  display:none;
  background:#222;
  border:1px solid #c42222;
  border-radius:8px;
  padding:12px 16px;
  color:#fff;
  font-size:13px;
  width:100%;
  max-width:400px;
  margin:8px auto 0;
  box-sizing:border-box;
}
.stats-display .sd-title{
  text-align:center;
  font-size:16px;
  font-weight:700;
  color:#ffcc00;
  margin-bottom:8px;
  padding-bottom:6px;
  border-bottom:1px solid #444;
}
.stats-display .sd-row{
  display:flex;
  justify-content:space-between;
  padding:3px 0;
  border-bottom:1px solid #333;
}
.stats-display .sd-row span:first-child{ color:#aaa; }
.stats-display .sd-row span:last-child{ color:#fff; font-weight:600; }

/* 食物面板選項 */
.food-item{
  padding:8px 12px;
  margin:4px 0;
  background:#333;
  border-radius:6px;
  cursor:pointer;
  font-size:15px;
  color:#fff;
  transition:background .15s;
}
.food-item:hover{ background:#555; }
.food-item:active{ background:#c42222; }

/* 訓練面板 */
.training-mode-selector{
  display:flex;
  flex-direction:column;
  gap:4px;
  margin-bottom:8px;
}
.training-mode-btn{
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex:1;
  padding:6px;
  background:#333;
  color:#fff;
  border:2px solid #888;
  border-radius:4px;
  font-size:12px;
  font-family:inherit;
  cursor:pointer;
  user-select:none;
}
.training-mode-btn.active{
  background:#333;
  border-color:#fff;
}
.training-mode-btn .help-icon{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:18px;height:18px;
  background:#555;
  color:#ffcc00;
  border:1px solid #aaa;
  border-radius:50%;
  font-size:11px;
  font-weight:700;
  cursor:pointer;
  flex-shrink:0;
  line-height:1;
}
.training-click-btn{
  width:100%;
  max-width:360px;
  height:70px;
  background:#c42222;
  color:#fff;
  border:none;
  border-radius:10px;
  font-size:26px;
  font-weight:700;
  cursor:pointer;
  margin-top:8px;
}
.training-click-btn:active{ background:#ff4444; }
.training-timer{
  position:absolute;
  left:50%;
  top:-150px;
  transform:translateX(-50%);
  font-size:48px;
  font-weight:bold;
  color:#ff0;
  text-shadow:2px 2px 0 #000;
}
.training-back-btn{
  display:block;
  margin:8px auto 0;
  padding:8px 24px;
  background:#555;
  color:#fff;
  border:none;
  border-radius:6px;
  font-size:14px;
  cursor:pointer;
}

/* 圖鑑面板 */
.digidex-stage{
  margin-bottom:12px;
}
.digidex-stage-title{
  color:#ffcc00;
  font-size:14px;
  font-weight:700;
  margin-bottom:6px;
  padding-bottom:4px;
  border-bottom:1px solid #444;
}
.digidex-grid{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.digidex-entry{
  display:flex;
  flex-direction:column;
  align-items:center;
  background:#333;
  border-radius:6px;
  padding:8px;
  width:72px;
  cursor:pointer;
  transition:background .15s;
}
.digidex-entry:hover{ background:#555; }
.digidex-entry canvas{
  display:block;
  width:48px;
  height:48px;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  margin-bottom:4px;
}
.digidex-entry .d-name{
  font-size:11px;
  color:#fff;
  text-align:center;
  word-break:break-all;
}

</style>
</head>
<body>
<h2 class="title">Digimon V-Pet</h2>

<!-- 單個主顯示屏 -->
<canvas id="screen" class="main-screen" width="32" height="16"></canvas>

<!-- 左右箭頭切換 -->
<div class="nav-bar">
  <button class="arrow-btn" id="btnLeft">◀</button>
  <button class="arrow-btn" id="btnRight">▶</button>
</div>

<!-- 中層：8個功能按鈕 -->
<div class="btn-panel" id="btnPanel">
</div>

<!-- 狀態面板（按鈕下方） -->
<div class="stats-display" id="statsDisplay">
  <div class="sd-title" id="sdName">Agumon</div>
  <div class="sd-row"><span>年齡</span><span id="sdAge">0歲</span></div>
  <div class="sd-row"><span>飢餓</span><span id="sdHunger" style="font-size:12px;letter-spacing:1px;">❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️</span></div>
  <div class="sd-row"><span>血量</span><span id="sdHp">120 / 120</span></div>
  <div class="sd-row"><span>攻擊力</span><span id="sdAtk">12</span></div>
  <div class="sd-row"><span>雙攻擊</span><span id="sdDouble">8%</span></div>
  <div class="sd-row"><span>攻速</span><span id="sdSpeed">3</span></div>
  <div class="sd-row"><span>閃避</span><span id="sdEvade">5%</span></div>
</div>

<!-- 食物面板（按鈕下方） -->
<div class="stats-display" id="foodDisplay" style="display:none;">
  <div class="sd-title">食物選擇</div>
  <div id="foodList" style="padding:4px 0;">
    <div class="food-item" data-food="meat" onclick="feedDigimon('meat')">🥩 1.肉</div>
  </div>
</div>

<!-- 訓練面板 -->
<div class="stats-display" id="trainingDisplay" style="display:none;">
  <div class="sd-title">訓練</div>
  <!-- 模式選擇 -->
  <div id="trainingModeSelect">
    <div class="training-mode-selector">
      <div class="training-mode-btn" id="trainingModeAttack" data-mode="attack">
        <span>1. 攻擊訓練</span>
        <span class="help-icon" data-mode="attack">!</span>
      </div>
      <div class="training-mode-btn" id="trainingModeLife" data-mode="life">
        <span>2. 生命訓練</span>
        <span class="help-icon" data-mode="life">!</span>
      </div>
      <div class="training-mode-btn" id="trainingModeCritical" data-mode="critical">
        <span>3. 爆擊訓練</span>
        <span class="help-icon" data-mode="critical">!</span>
      </div>
    </div>
    <div id="trainingHelpPopup" style="display:none;background:#1a1a2e;border:1px solid #ffcc00;border-radius:6px;padding:8px 10px;margin-bottom:8px;font-size:12px;color:#ddd;line-height:1.6;"></div>
    <div style="text-align:center;">
      <button class="training-back-btn" id="trainingBackBtn">返回</button>
    </div>
  </div>
  <!-- 開始訓練後 -->
  <div id="trainingPlayView" style="display:none; text-align:center; position:relative;">
    <div id="trainingTimerDisplay" class="training-timer">3</div>
    <button class="training-click-btn" id="trainingClickBtn">點擊</button>
    <button class="training-back-btn" id="trainingModeBackBtn">返回選擇</button>
  </div>
</div>

<!-- 圖鑑面板 -->
<div class="stats-display" id="digidexDisplay" style="display:none;">
  <div class="sd-title">圖鑑</div>
  <div id="digidexContent"></div>
</div>


<script>
const canvas = document.getElementById('screen');
const ctx = canvas.getContext('2d');

// ========== 參數設定 ==========
const CELL_SIZE = 16;
const GAP = 1;
const PITCH = CELL_SIZE + GAP; // 17
const ROWS = 18;
const COLS = 12;
const FRAME_LABELS = ["idle","idle","eat","eat","sleep","sleep","refuse","happy","angry","hurt","sad","attack"];
const DIGIMON_NAMES = ["Botamon","Koromon","Agumon","Greymon","MetalGreymon","WarGreymon","Omegamon"];

// ========== 圖鑑資料 ==========
const DIGIDEX_STAGES = [
  { name: "幼年期",   rows: [0] },
  { name: "幼年期Ⅱ", rows: [1] },
  { name: "成長期",   rows: [2, 3] },
  { name: "成熟期",   rows: [4, 5, 6, 7, 8, 9, 10] },
  { name: "完全體",   rows: [11, 12, 13] },
];
// 所有 sprite row 的名稱（0～13）
const ALL_NAMES = [
  "黑球獸","滾球獸","亞古獸","貝塔獸",
  "暴龍獸","巨龍獸","惡魔獸","火焰獸","飛龍獸","海龍獸","鼻涕獸",
  "機械暴龍獸(藍)","豆豆獸","門左衛獸",
];

// 精靈圖路徑（獨立行圖片）
const BG_NAMES = ["Normal", "Noon", "dusk", "Night"];

let rowImages = new Array(18); // row_00.png ~ row_17.png
let meatImage = new Image();
let bgImages = {};
let currentBgName = "Normal";

function getBgNameByHour(h) {
  if (h >= 19 || h < 5) return "Night";
  if (h >= 5 && h < 7) return "dusk";
  if (h >= 7 && h < 10) return "Normal";
  if (h >= 10 && h < 14) return "Noon";
  if (h >= 14 && h < 17) return "Normal";
  return "dusk"; // 17:00-18:59
}

function updateBgByTime() {
  const name = getBgNameByHour(new Date().getHours());
  if (name !== currentBgName) {
    currentBgName = name;
    renderFrame();
  }
}
let currentRow = 2;    // 目前選擇的數碼獸 row
// 當前場景（目前僅用來決定渲染行為）

// ========== 自動動畫變數 ==========
let autoX = 9;            // 1~17 連續座標（16px 精靈在 32px 畫布內）
let autoTargetX = null;
let autoAnimStep = 0;
const ANIM_IV = 800;
const EDGE_IV = 500;
const MOVE_IV = 2000;
const EDGE_SEQ = [0, 11, 11, 0];
const MID_SEQ  = [0, 0, 0, 1];
let autoAnimIv = ANIM_IV;
let autoTimer = null;
let autoMoveTimer = null;

// ========== 進食/拒絕 模式變數 ==========
let gameMode = "auto";       // "auto" | "eating" | "refusing"
let gameModeStep = 0;
const EAT_IV = 400;
const REFUSE_IV = 300;

// ========== 繪製 ==========
function getColForAuto(){
  const isEdge = autoX <= 1 || autoX >= 17;
  const isMoving = autoTargetX !== null;
  if(isEdge && !isMoving) return EDGE_SEQ[autoAnimStep % 4];
  return MID_SEQ[autoAnimStep % 4];
}

function renderFrame(){
  if(trainingMode){
    renderTrainingCanvas();
    return;
  }
  ctx.fillStyle="#000";
  ctx.fillRect(0,0,32,16);
  // 背景（根據目前時間）
  ctx.drawImage(bgImages[currentBgName] || bgImages["Normal"], 0, 0, 32, 16);

  if(gameMode === "eating"){
    // 進食模式：龍在右邊向左，食物固定，動畫依序切換 4 幀
    const col = (gameModeStep % 2 === 0) ? 2 : 3; // eat1 / eat2
    const foodX = 0;                                // 食物固定在左側
    const foodFrame = Math.floor((gameModeStep + 1) / 2); // 只在 EAT2 時進幀
    // 畫肉
    if(meatImage.complete && meatImage.naturalWidth > 0){
      ctx.drawImage(
        meatImage,
        foodFrame * CELL_SIZE, 0, CELL_SIZE, CELL_SIZE,
        foodX, 0, CELL_SIZE, CELL_SIZE
      );
    }
    // 龍在右邊 (autoX=14)，面向左（預設方向）
    ctx.drawImage(
      rowImages[currentRow],
      col * PITCH, 0,
      CELL_SIZE, CELL_SIZE,
      16, 0,  // 龍靠右邊站位
      CELL_SIZE, CELL_SIZE
    );
    return;
  }

  if(gameMode === "refusing"){
    // 拒絕模式：龍在中間左右面向交替（左→右→左→右）
    const faceFlip = gameModeStep % 2 === 0;
    ctx.save();
    let drawX = 8;
    if(faceFlip){
      ctx.translate(32, 0);
      ctx.scale(-1, 1);
      drawX = 16 - 8; // 翻轉後座標校正
    }
    ctx.drawImage(
      rowImages[currentRow],
      6 * PITCH, 0,  // col 6 = refuse frame, source y=0
      CELL_SIZE, CELL_SIZE,
      drawX, 0,
      CELL_SIZE, CELL_SIZE
    );
    ctx.restore();
    return;
  }

  // 普通模式
  const colIndex = getColForAuto();
  const faceRight = (autoTargetX !== null && autoX < autoTargetX) || (autoTargetX === null && autoX >= 9);
  const spriteX = autoX - 1;

  ctx.save();
  let drawX = spriteX;
  if(faceRight){
    ctx.translate(32, 0);
    ctx.scale(-1, 1);
    drawX = 16 - spriteX; // 翻转後座標校正
  }
  ctx.drawImage(
    rowImages[currentRow],
    colIndex * PITCH, 0,
    CELL_SIZE, CELL_SIZE,
    drawX, 0,
    CELL_SIZE, CELL_SIZE
  );
  ctx.restore();
}

// ========== 動畫 / 移動 ==========
function stepAutoAnim(){
  // 進食模式
  if(gameMode === "eating"){
    gameModeStep++;
    if(gameModeStep >= 6){
      gameMode = "auto";
      gameModeStep = 0;
      // 動畫結束後走回中間
      autoTargetX = 9;
      autoAnimStep = 0;
      restartAnimTimer(ANIM_IV);
      if(!autoMoveTimer) autoMoveTimer = setInterval(stepAutoMove, MOVE_IV);
      renderFrame();
      return;
    }
    renderFrame();
    return;
  }
  // 拒絕模式（搖晃）
  if(gameMode === "refusing"){
    gameModeStep++;
    if(gameModeStep >= 8){
      gameMode = "auto";
      gameModeStep = 0;
      autoAnimStep = 0;
      autoTargetX = 9;
      restartAnimTimer(ANIM_IV);
      if(!autoMoveTimer) autoMoveTimer = setInterval(stepAutoMove, MOVE_IV);
      renderFrame();
      return;
    }
    renderFrame();
    return;
  }
  // 普通模式
  let justLanded = false;
  if(autoTargetX !== null){
    const step = autoX < autoTargetX ? 1 : -1;
    autoX += step;
    if(Math.abs(autoX - autoTargetX) < 0.5 ||
       (step > 0 && autoX >= autoTargetX) ||
       (step < 0 && autoX <= autoTargetX)){
      autoX = autoTargetX;
      autoTargetX = null;
      justLanded = true;
    }
  }
  if(justLanded && (autoX <= 1 || autoX >= 17)) {
    autoAnimStep = -1;
  }
  autoAnimStep++;
  renderFrame();
  const isEdge = autoX <= 1 || autoX >= 17;
  if(isEdge && autoTargetX === null && autoAnimIv !== EDGE_IV){
    restartAnimTimer(EDGE_IV);
  } else if(!isEdge && autoAnimIv !== ANIM_IV){
    restartAnimTimer(ANIM_IV);
  }
}

function stepAutoMove(){
  if(autoTargetX !== null) return;
  const isEdge = autoX <= 1 || autoX >= 17;
  if(isEdge){
    if(autoAnimStep < 5) return;
    autoTargetX = 9;
  } else {
    if(Math.random() < 0.1) return;
    const dir = Math.random() < 0.5 ? -1 : 1;
    const t = autoX + dir * 5;
    autoTargetX = Math.max(1, Math.min(17, t));
    if(autoTargetX === autoX) return;
  }
  autoAnimStep = 0;
}

function restartAnimTimer(iv){
  if(autoAnimIv === iv) return;
  if(autoTimer) clearInterval(autoTimer);
  autoAnimIv = iv;
  autoTimer = setInterval(stepAutoAnim, iv);
}

function startAutoPlay(){
  updateBgByTime(); // 首次根據時間設定背景
  autoX = 9;
  autoTargetX = null;
  autoAnimStep = 0;
  autoAnimIv = ANIM_IV;
  autoTimer = setInterval(stepAutoAnim, ANIM_IV);
  autoMoveTimer = setInterval(stepAutoMove, MOVE_IV);
  renderFrame();
}

// ========== 訓練系統 ==========
let trainingMode = false;
let trainingLevel = 0;       // 0~6, 已充能格數
let trainingClickCount = 0;  // 點擊次數（每2次+1級）
let trainingAttackActive = false;
let trainingProjectileX = 0;
let trainingProjectileTimer = null;
let powerImage = new Image();
let attackProjImage = new Image();
let tbgImage = new Image();  // 訓練背景
let sandbagImage = new Image();
let sandbagImage2 = new Image();
let sandbagImage3 = new Image();  // 被打中後的沙包
let boomImage = new Image();      // 爆炸01
let boomImage2 = new Image();     // 爆炸02
let happyImage = new Image();    // 慶祝愛心
let sandbagState = "normal";     // "normal" | "boom" | "hit"
let boomFrame = 0;               // 爆炸幀 (0=Boom01, 1=Boom02)
let boomCycle = 0;               // 爆炸已播放的完整週期
let sandbagTimer = null;
let boomTimer = null;

let trainingIdleFrame = 0;         // idle 幀切換 (0/1)
let trainingIdleTimer = null;
let trainingPowerHidden = false;   // 攻擊完成後隱藏 Power
let trainingCelebrationActive = false;
let trainingCelebrationTimer = null;
let trainingCelebrationStep = 0;
const TRAINING_CELEBRATION_SEQ = [0, 7, 0, 7]; // idle, happy, idle, happy
let trainingTimer = null;           // 倒數計時 interval
let trainingCountdown = 3;          // 剩餘秒數
let trainingType = "attack";        // "attack" | "life" | "critical"
let trainingFailed = false;         // 是否失敗
let trainingFailureActive = false;  // 失敗動畫播放中
let trainingFailureTimer = null;
let trainingFailureStep = 0;
const TRAINING_FAILURE_SEQ = [0, 10, 0, 10]; // idle, sad, idle, sad
let sadImage = new Image();        // 失敗難過圖
let shieldImage = new Image();     // 生命訓練盾牌
let pointImage = new Image();      // 生命訓練點
let shieldBreakImage = new Image();// 盾牌破壞圖
let lifePointsRemaining = 4;       // 剩餘 point 數 (2~4)
let lifeShieldBroken = false;      // 盾牌是否破壞
let boxingImage = new Image();     // 生命訓練成功時的拳擊手
let lifePhase = "play";            // 生命訓練階段: "play" | "boxing" | "boom" | "shieldHold" | "celebration"
let lifeBoxingX = 0;               // 拳擊手當前 x 位置
let lifeBoxingTimer = null;
let lifeBoomTimer = null;
let lifeShieldHoldTimer = null;
let lifeFailureHoldTimer = null;   // 生命訓練失敗時等待 1 秒的計時器
let lifeDragonMoveX = 48;          // 龍慶祝時的 x 位置（會從 48 移動到 32）

// ========== 爆擊訓練變量 ==========
let criticalBarImage = new Image();  // 爆擊條 (64x16)
let wallImage = new Image();         // 牆 (16x16)
let wallBrokenImage = new Image();   // 破壞的牆 (16x16)
let criticalWallBroken = false;      // 牆是否已破壞
let criticalPos = 0;                 // 當前位置 0-3
let criticalDirection = 1;           // 1=右移, -1=左移
let criticalBarActive = false;       // bar 是否在移動
let criticalPaused = false;          // 在端點暫停中
let criticalBarTimer = null;
let criticalAttackTimer = null;
let criticalAttackStep = 0;          // 成功攻擊步驟
let criticalBoomY = 0;               // 攻擊時 BOOM 的 y 位置
const TRAIN_SLOTS = 5;
// 主 canvas 在訓練時改為 64×16：
// [---Projectile@16---][Dragon@32][Power@48]
const CANVAS_NORMAL_W = 32;
const CANVAS_TRAIN_W = 64;

function selectTrainingType(type){
  if(trainingAttackActive || trainingCelebrationActive || trainingFailureActive) return;
  trainingType = type;
  document.getElementById("trainingModeAttack").classList.toggle("active", type === "attack");
  document.getElementById("trainingModeLife").classList.toggle("active", type === "life");
  document.getElementById("trainingModeCritical").classList.toggle("active", type === "critical");
  // 選完後直接開始倒數
  startTrainingPlay();
}

function startTraining(){
  const trainPanel = document.getElementById("trainingDisplay");
  
  // 若訓練面板已顯示則關閉（切換）
  if(trainPanel.style.display === "block"){
    stopTraining();
    return;
  }
  
  // 關閉其他面板
  document.getElementById("statsDisplay").style.display = "none";
  document.getElementById("foodDisplay").style.display = "none";
  document.getElementById("digidexDisplay").style.display = "none";
  
  // 暫停自動模式
  if(autoTimer) clearInterval(autoTimer);
  if(autoMoveTimer) clearInterval(autoMoveTimer);
  autoTimer = null;
  autoMoveTimer = null;
  
  trainingMode = true;
  trainingLevel = 0;
  trainingClickCount = 0;
  trainingAttackActive = false;
  trainingIdleFrame = 0;
  if(trainingProjectileTimer){
    clearInterval(trainingProjectileTimer);
    trainingProjectileTimer = null;
  }
  if(trainingIdleTimer){
    clearInterval(trainingIdleTimer);
    trainingIdleTimer = null;
  }
  if(sandbagTimer){
    clearInterval(sandbagTimer);
    sandbagTimer = null;
  }
  if(boomTimer){
    clearInterval(boomTimer);
    boomTimer = null;
  }
  trainingProjectileX = 0;
  sandbagState = "normal";
  boomFrame = 0;
  boomCycle = 0;
  
  // 開 idle 動畫定時器（切換 idle1/idle2）
  trainingIdleTimer = setInterval(() => {
    trainingIdleFrame = trainingIdleFrame === 0 ? 1 : 0;
    renderFrame();
  }, 800);
  
  // 重置慶祝狀態
  trainingPowerHidden = false;
  trainingCelebrationActive = false;
  trainingCelebrationStep = 0;
  if(trainingCelebrationTimer){
    clearInterval(trainingCelebrationTimer);
    trainingCelebrationTimer = null;
  }

  // 重置失敗狀態
  trainingFailed = false;
  trainingFailureActive = false;
  trainingFailureStep = 0;
  if(trainingFailureTimer){
    clearInterval(trainingFailureTimer);
    trainingFailureTimer = null;
  }
  if(trainingTimer){
    clearInterval(trainingTimer);
    trainingTimer = null;
  }
  document.getElementById("trainingTimerDisplay").textContent = "";
  lifePhase = "play";

  // 預設模式（高亮 1. 攻擊訓練）
  trainingType = "attack";
  document.getElementById("trainingModeAttack").classList.add("active");
  document.getElementById("trainingModeLife").classList.remove("active");
  document.getElementById("trainingModeCritical").classList.remove("active");
  // 顯示模式選擇，隱藏開始訓練視圖
  document.getElementById("trainingModeSelect").style.display = "block";
  document.getElementById("trainingPlayView").style.display = "none";

  // 主 canvas 寬度改為 64
  canvas.width = CANVAS_TRAIN_W;
  canvas.style.width = (CANVAS_TRAIN_W * 6) + "px";
  renderFrame();

  trainPanel.style.display = "block";
}

function startTrainingPlay(){
  // 從模式選擇切換到開始訓練視圖，並啟動 3 秒倒數
  if(trainingAttackActive || trainingCelebrationActive || trainingFailureActive) return;

  document.getElementById("trainingModeSelect").style.display = "none";
  document.getElementById("trainingPlayView").style.display = "block";

  // 重置充能狀態
  trainingLevel = 0;
  trainingClickCount = 0;
  trainingPowerHidden = false;
  // 重置生命訓練狀態（隨機 2~4 個 point）
  lifePointsRemaining = Math.floor(Math.random() * 3) + 2;
  lifeShieldBroken = false;
  lifePhase = "play";

  // 爆擊訓練：不計時，改 bar 移動
  if(trainingType === "critical"){
    document.getElementById("trainingTimerDisplay").textContent = "";
    criticalWallBroken = false;
    startCriticalBar();
    renderFrame();
    return;
  }

  // 開始倒數計時（UI 每秒更新）
  trainingCountdown = (trainingType === "life") ? 2 : 3;
  document.getElementById("trainingTimerDisplay").textContent = trainingCountdown;
  trainingTimer = setInterval(() => {
    trainingCountdown--;
    document.getElementById("trainingTimerDisplay").textContent = trainingCountdown;
    if(trainingCountdown <= 0){
      clearInterval(trainingTimer);
      trainingTimer = null;
      document.getElementById("trainingTimerDisplay").textContent = "";
      // 生命訓練：4 個點全消失 = 成功，否則失敗
      if(trainingType === "life"){
        if(lifePointsRemaining <= 0 && !lifeShieldBroken){
          triggerTrainingAttack();
        } else {
          triggerTrainingFailure();
        }
      } else {
        triggerTrainingFailure();
      }
    }
  }, 1000);

  renderFrame();
}

function backToTrainingModeSelect(){
  if(trainingAttackActive || trainingCelebrationActive || trainingFailureActive) return;
  // 清除計時器
  if(trainingTimer){
    clearInterval(trainingTimer);
    trainingTimer = null;
  }
  document.getElementById("trainingTimerDisplay").textContent = "";
  // 重置充能狀態
  trainingLevel = 0;
  trainingClickCount = 0;
  trainingPowerHidden = false;
  lifePhase = "play";
  // 爆擊訓練清理
  if(criticalBarTimer){
    clearInterval(criticalBarTimer);
    criticalBarTimer = null;
  }
  if(criticalAttackTimer){
    clearInterval(criticalAttackTimer);
    criticalAttackTimer = null;
  }
  criticalBarActive = false;
  // 切換視圖
  document.getElementById("trainingPlayView").style.display = "none";
  document.getElementById("trainingModeSelect").style.display = "block";
  renderFrame();
}

function stopTraining(){
  trainingMode = false;
  if(trainingProjectileTimer){
    clearInterval(trainingProjectileTimer);
    trainingProjectileTimer = null;
  }
  if(trainingIdleTimer){
    clearInterval(trainingIdleTimer);
    trainingIdleTimer = null;
  }
  if(sandbagTimer){
    clearInterval(sandbagTimer);
    sandbagTimer = null;
  }
  if(boomTimer){
    clearInterval(boomTimer);
    boomTimer = null;
  }
  if(trainingCelebrationTimer){
    clearInterval(trainingCelebrationTimer);
    trainingCelebrationTimer = null;
  }
  if(trainingTimer){
    clearInterval(trainingTimer);
    trainingTimer = null;
  }
  document.getElementById("trainingTimerDisplay").textContent = "";
  if(trainingFailureTimer){
    clearInterval(trainingFailureTimer);
    trainingFailureTimer = null;
  }
  // 生命訓練成功動畫的計時器
  if(lifeBoxingTimer){
    clearInterval(lifeBoxingTimer);
    lifeBoxingTimer = null;
  }
  if(lifeBoomTimer){
    clearInterval(lifeBoomTimer);
    lifeBoomTimer = null;
  }
  if(lifeShieldHoldTimer){
    clearTimeout(lifeShieldHoldTimer);
    lifeShieldHoldTimer = null;
  }
  if(lifeFailureHoldTimer){
    clearTimeout(lifeFailureHoldTimer);
    lifeFailureHoldTimer = null;
  }
  // 爆擊訓練計時器
  if(criticalBarTimer){
    clearInterval(criticalBarTimer);
    criticalBarTimer = null;
  }
  if(criticalAttackTimer){
    clearInterval(criticalAttackTimer);
    criticalAttackTimer = null;
  }
  criticalBarActive = false;
  lifePhase = "play";
  document.getElementById("trainingDisplay").style.display = "none";
  // 恢復 canvas 尺寸
  canvas.width = CANVAS_NORMAL_W;
  canvas.style.width = "";
  // 恢復自動模式
  startAutoPlay();
}

function handleTrainingClick(){
  if(trainingAttackActive) return;  // 攻擊動畫中不可操作
  if(trainingCelebrationActive) return; // 慶祝中不可操作
  if(trainingFailed || trainingFailureActive) return; // 失敗後不可再點
  
  // 生命訓練邏輯
  if(trainingType === "life"){
    if(lifeShieldBroken) return;
    if(lifePointsRemaining <= 0){
      // 點完所有 point 再點 → 盾牌破壞 = 失敗
      lifeShieldBroken = true;
      if(trainingTimer){
        clearInterval(trainingTimer);
        trainingTimer = null;
      }
      document.getElementById("trainingTimerDisplay").textContent = "";
      triggerTrainingFailure();
      return;
    }
    lifePointsRemaining--;
    renderFrame();
    return;
  }

  // 爆擊訓練：停止 bar，判定成敗
  if(trainingType === "critical"){
    if(!criticalBarActive) return;
    stopCriticalBar();
    return;
  }
  
  trainingClickCount++;
  // 每2次點擊向右移動1格
  if(trainingClickCount % 2 === 0){
    trainingLevel++;
    if(trainingLevel >= TRAIN_SLOTS){
      // 成功滿能 → 清除計時器，觸發攻擊
      if(trainingTimer){
        clearInterval(trainingTimer);
        trainingTimer = null;
      }
      document.getElementById("trainingTimerDisplay").textContent = "";
      triggerTrainingAttack();
      return;
    }
  }
  renderFrame();
}

function triggerTrainingAttack(){
  trainingAttackActive = true;
  trainingLevel = 6;
  // 確保計時器清除
  if(trainingTimer){
    clearInterval(trainingTimer);
    trainingTimer = null;
  }
  document.getElementById("trainingTimerDisplay").textContent = "";
  // 攻擊時停止 idle 與沙包動畫
  if(trainingIdleTimer){
    clearInterval(trainingIdleTimer);
    trainingIdleTimer = null;
  }
  if(sandbagTimer){
    clearInterval(sandbagTimer);
    sandbagTimer = null;
  }

  // 生命訓練：新的成功動畫序列（boxing → boom → shield 完好 → 龍移動 happy）
  if(trainingType === "life"){
    startLifeSuccessAnimation();
    return;
  }

  trainingProjectileX = 16;
  renderFrame();
  
  // 火球連續每像素向左移動
  trainingProjectileTimer = setInterval(() => {
    trainingProjectileX -= 1;
    renderFrame();
    if(trainingProjectileX <= 0){
      // 火球擊中沙包 → 停止移動、觸發爆炸
      clearInterval(trainingProjectileTimer);
      trainingProjectileTimer = null;
      trainingAttackActive = false;
      startBoomSequence();
    } else if(trainingProjectileX < -16){
      // 防護：若直接飛過頭則重置
      clearInterval(trainingProjectileTimer);
      trainingProjectileTimer = null;
      trainingAttackActive = false;
      endTrainingAttack();
    }
  }, 16);
}

function startBoomSequence(){
  // 切換到爆炸狀態
  sandbagState = "boom";
  boomFrame = 0;
  boomCycle = 0;
  renderFrame();
  
  // 每 200ms 切換爆炸幀，2 週期後結束
  boomTimer = setInterval(() => {
    boomFrame = boomFrame === 0 ? 1 : 0;
    if(boomFrame === 0){
      boomCycle++; // 完成一個完整週期 (01→02)
    }
    if(boomCycle >= 2){
      clearInterval(boomTimer);
      boomTimer = null;
      // 爆炸結束 → 換成被打中的沙包
      sandbagState = "hit";
      renderFrame();
      endTrainingAttack();
      return;
    }
    renderFrame();
  }, 200);
}

function endTrainingAttack(){
  // 攻擊/爆炸完成的清理與重置
  trainingLevel = 0;
  trainingClickCount = 0;
  trainingProjectileX = 0;
  trainingAttackActive = false;
  trainingPowerHidden = true;

  // 停止 idle 定時器（若有）
  if(trainingIdleTimer){
    clearInterval(trainingIdleTimer);
    trainingIdleTimer = null;
  }

  // 開始慶祝動畫：idle → happy → idle → happy
  trainingCelebrationActive = true;
  trainingCelebrationStep = 0;
  trainingCelebrationTimer = setInterval(() => {
    trainingCelebrationStep++;
    if(trainingCelebrationStep >= TRAINING_CELEBRATION_SEQ.length){
      // 慶祝結束，自動返回
      clearInterval(trainingCelebrationTimer);
      trainingCelebrationTimer = null;
      trainingCelebrationActive = false;
      stopTraining();
    }
    renderFrame();
  }, 600);

  renderFrame();
}

function triggerTrainingFailure(){
  if(trainingAttackActive) return;  // 攻擊中不算失敗
  if(trainingFailed) return;       // 已經失敗了
  if(trainingLevel >= TRAIN_SLOTS) return; // 已滿不算
  if(trainingFailureActive) return;

  // 確保計時器已清除
  if(trainingTimer){
    clearInterval(trainingTimer);
    trainingTimer = null;
  }
  document.getElementById("trainingTimerDisplay").textContent = "";

  trainingFailed = true;
  trainingFailureActive = true;
  trainingPowerHidden = true;

  // 停止 Idle 動畫
  if(trainingIdleTimer){
    clearInterval(trainingIdleTimer);
    trainingIdleTimer = null;
  }

  // 生命訓練：先等 1 秒（盾牌完好），龍再移動到盾牌位置 + SAD
  if(trainingType === "life"){
    lifePhase = "failureHold";      // 等 1 秒，龍在 x=48，盾牌完好
    renderFrame();
    lifeFailureHoldTimer = setTimeout(() => {
      lifeFailureHoldTimer = null;
      lifePhase = "failure";        // 盾牌隱藏，龍移到盾牌位置
      lifeDragonMoveX = 32;
      // 開始 SAD 動畫
      trainingFailureStep = 0;
      trainingFailureTimer = setInterval(() => {
        trainingFailureStep++;
        if(trainingFailureStep >= TRAINING_FAILURE_SEQ.length){
          clearInterval(trainingFailureTimer);
          trainingFailureTimer = null;
          trainingFailureActive = false;
          trainingFailed = false;
          stopTraining();
        }
        renderFrame();
      }, 600);
      renderFrame();
    }, 1000);
    return;
  }

  // 其他訓練：直接失敗動畫
  trainingFailureStep = 0;
  trainingFailureTimer = setInterval(() => {
    trainingFailureStep++;
    if(trainingFailureStep >= TRAINING_FAILURE_SEQ.length){
      clearInterval(trainingFailureTimer);
      trainingFailureTimer = null;
      trainingFailureActive = false;
      trainingFailed = false;
      stopTraining();
    }
    renderFrame();
  }, 600);

  renderFrame();
}

// ========== 生命訓練成功動畫 ==========
function startLifeSuccessAnimation(){
  // 確保計時器清除
  if(trainingTimer){
    clearInterval(trainingTimer);
    trainingTimer = null;
  }
  document.getElementById("trainingTimerDisplay").textContent = "";
  if(trainingCelebrationTimer){
    clearInterval(trainingCelebrationTimer);
    trainingCelebrationTimer = null;
  }
  trainingCelebrationActive = false;
  trainingCelebrationStep = 0;
  trainingPowerHidden = true;

  // 龍保持原本位置 x=48
  lifeDragonMoveX = 48;

  // 階段 1: boxing 從最左一格一格向右移動到盾牌
  lifePhase = "boxing";
  lifeBoxingX = 0;
  renderFrame();

  let boxingStepCount = 0;
  lifeBoxingTimer = setInterval(() => {
    boxingStepCount++;
    if(boxingStepCount >= 32){
      // 已到達盾牌位置 (x=32)，切到 BOOM 階段
      clearInterval(lifeBoxingTimer);
      lifeBoxingTimer = null;
      lifePhase = "boom";
      startLifeBoom();
    } else {
      lifeBoxingX += 1; // 每次移動 1 像素
      renderFrame();
    }
  }, 30);
}

function startLifeBoom(){
  // 顯示 BOOM 動畫覆蓋盾牌位置
  boomFrame = 0;
  boomCycle = 0;
  renderFrame();

  lifeBoomTimer = setInterval(() => {
    boomFrame = boomFrame === 0 ? 1 : 0;
    if(boomFrame === 0) boomCycle++;
    if(boomCycle >= 2){
      // BOOM 結束 → 盾牌完好顯示 1 秒
      clearInterval(lifeBoomTimer);
      lifeBoomTimer = null;
      lifePhase = "shieldHold";
      renderFrame();
      lifeShieldHoldTimer = setTimeout(() => {
        lifeShieldHoldTimer = null;
        // 盾牌隱藏，龍移動到盾牌位置 + happy
        lifePhase = "celebration";
        startLifeCelebration();
      }, 1000);
      return;
    }
    renderFrame();
  }, 200);
}

function startLifeCelebration(){
  lifeDragonMoveX = 48;
  trainingCelebrationActive = true;
  trainingCelebrationStep = 0;
  trainingAttackActive = false; // 慶祝階段由 trainingCelebrationActive 阻擋操作

  trainingCelebrationTimer = setInterval(() => {
    trainingCelebrationStep++;
    // 龍在慶祝過程中從 x=48 移動到 x=32（盾牌位置，從右到左第2個16×16）
    if(trainingCelebrationStep === 1) lifeDragonMoveX = 32;       // 第1下 happy 就到盾牌位置
    else if(trainingCelebrationStep >= 2) lifeDragonMoveX = 32;   // 停留

    if(trainingCelebrationStep >= TRAINING_CELEBRATION_SEQ.length){
      clearInterval(trainingCelebrationTimer);
      trainingCelebrationTimer = null;
      trainingCelebrationActive = false;
      stopTraining();
      return;
    }
    renderFrame();
  }, 600);
  renderFrame();
}

// ========== 爆擊訓練函數 ==========
function startCriticalBar(){
  criticalPos = 0;
  criticalDirection = 1;
  criticalBarActive = true;
  criticalPaused = false;
  renderFrame();

  criticalBarTimer = setInterval(() => {
    if(!criticalBarActive) return;
    if(criticalPaused) return; // 端點暫停中，等 timeout 恢復

    criticalPos += criticalDirection;

    if(criticalPos > 3){
      // 到最右邊 (x=48)，暫停 1 秒後左移
      criticalPos = 3;
      criticalPaused = true;
      renderFrame();
      setTimeout(() => {
        criticalPaused = false;
        criticalDirection = -1;
        criticalPos = 2;
        renderFrame();
      }, 400);
      return;
    } else if(criticalPos < 0){
      // 到最左邊 (x=0)，立即右移
      criticalPos = 0;
      criticalDirection = 1;
      criticalPos = 1;
      renderFrame();
      return;
    }
    renderFrame();
  }, 150);
}

function stopCriticalBar(){
  criticalBarActive = false;
  if(criticalBarTimer){
    clearInterval(criticalBarTimer);
    criticalBarTimer = null;
  }
  if(criticalPos === 3){
    // 停在最右 → 成功！雙上下攻擊
    startCriticalSuccessAnimation();
  } else {
    // 沒對準 → 失敗
    if(trainingTimer){
      clearInterval(trainingTimer);
      trainingTimer = null;
    }
    document.getElementById("trainingTimerDisplay").textContent = "";
    triggerTrainingFailure();
  }
}

function startCriticalSuccessAnimation(){
  // 成功：龍在 x=32 發射雙火球 → 抵達牆後 BOOM → 牆變 broken → 慶祝
  trainingAttackActive = true;
  criticalAttackStep = 16;  // 火球起始 x 位置
  criticalWallBroken = false;
  renderFrame();

  // Phase 1：火球從 x=16 一格一格向左移動到牆（16ms 每格）
  criticalAttackTimer = setInterval(() => {
    criticalAttackStep -= 1;
    if(criticalAttackStep <= 0){
      // 火球抵達牆，切到 Phase 2：BOOM 動畫
      clearInterval(criticalAttackTimer);
      boomFrame = 0;
      boomCycle = 0;
      renderFrame();

      criticalAttackTimer = setInterval(() => {
        boomFrame = boomFrame === 0 ? 1 : 0;
        if(boomFrame === 0) boomCycle++;
        if(boomCycle >= 2){
          // BOOM 結束 → 牆變 broken → 慶祝
          clearInterval(criticalAttackTimer);
          criticalAttackTimer = null;
          criticalWallBroken = true;
          trainingAttackActive = false;
          endTrainingAttack();
          return;
        }
        renderFrame();
      }, 200);
      return;
    }
    renderFrame();
  }, 16);
}

function renderTrainingCanvas(){
  // 繪製訓練背景 (384×96 等比繪於 64×16 canvas)
  if(tbgImage.complete && tbgImage.naturalWidth > 0){
    ctx.drawImage(tbgImage, 0, 0, CANVAS_TRAIN_W, 16);
  } else {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, CANVAS_TRAIN_W, 16);
  }

  // 龍幀選擇：慶祝/失敗/攻擊/平時
  let dragonFrame;
  if(trainingFailureActive){
    dragonFrame = TRAINING_FAILURE_SEQ[trainingFailureStep];
  } else if(trainingCelebrationActive){
    dragonFrame = TRAINING_CELEBRATION_SEQ[trainingCelebrationStep];
  } else if(trainingAttackActive && trainingType !== "life"){
    dragonFrame = 11;
  } else {
    dragonFrame = trainingIdleFrame;
  }

  if(trainingType === "life"){
    // 生命訓練：根據 lifePhase 決定顯示
    // 計算龍當前 x 位置（慶祝/失敗 sad 時在盾牌位置 x=32，其餘固定 x=48）
    const lifeDragonX = (lifePhase === "celebration" || lifePhase === "failure") ? lifeDragonMoveX : 48;

    // 盾牌 / BOOM 顯示
    if(lifePhase === "boom"){
      // 階段 2: BOOM 動畫覆蓋盾牌位置
      const bImg = boomFrame === 0 ? boomImage : boomImage2;
      if(bImg.complete && bImg.naturalWidth > 0){
        ctx.drawImage(bImg, 32, 0, 16, 16);
      }
    } else if(lifePhase === "celebration" || lifePhase === "failure"){
      // 階段 5: 盾牌隱藏（慶祝 / 失敗 SAD 時）
    } else {
      // 階段 play / boxing / shieldHold：顯示盾牌
      const shieldImg = lifeShieldBroken ? shieldBreakImage : shieldImage;
      if(shieldImg.complete && shieldImg.naturalWidth > 0){
        ctx.drawImage(shieldImg, 32, 0, 16, 16);
      }
      // 僅 play 階段顯示剩餘 point
      if(lifePhase === "play" && !lifeShieldBroken && pointImage.complete && pointImage.naturalWidth > 0){
        const positions = [
          [32, 0], // 上左
          [40, 0], // 上右
          [32, 8], // 下左
          [40, 8], // 下右
        ];
        for(let i = 0; i < lifePointsRemaining && i < 4; i++){
          ctx.drawImage(pointImage, positions[i][0], positions[i][1], 8, 8);
        }
      }
    }

    // 顯示 boxing 圖（僅 boxing 階段）
    if(lifePhase === "boxing" && boxingImage.complete && boxingImage.naturalWidth > 0){
      ctx.drawImage(boxingImage, lifeBoxingX, 0, 16, 16);
    }

    // 龍（跟隨 lifeDragonX，慶祝時從 48 移動到 32）
    if(rowImages[currentRow] && rowImages[currentRow].complete && rowImages[currentRow].naturalWidth > 0){
      ctx.drawImage(
        rowImages[currentRow],
        dragonFrame * PITCH, 0,
        16, 16,
        lifeDragonX, 0,
        16, 16
      );
    }

    // 慶祝時 happy icons（固定位置 x=24, x=48，與攻擊訓練相同）
    if(trainingCelebrationActive && happyImage.complete && happyImage.naturalWidth > 0
       && TRAINING_CELEBRATION_SEQ[trainingCelebrationStep] === 7){
      ctx.drawImage(happyImage, 24, 0, 8, 8);
      ctx.drawImage(happyImage, 24, 8, 8, 8);
      ctx.drawImage(happyImage, 48, 0, 8, 8);
      ctx.drawImage(happyImage, 48, 8, 8, 8);
    }
    // 失敗時 sad icons（固定位置 x=24, x=48，與攻擊訓練相同）
    if(trainingFailureActive && sadImage.complete && sadImage.naturalWidth > 0
       && TRAINING_FAILURE_SEQ[trainingFailureStep] === 10){
      ctx.drawImage(sadImage, 24, 0, 8, 8);
      ctx.drawImage(sadImage, 24, 8, 8, 8);
      ctx.drawImage(sadImage, 48, 0, 8, 8);
      ctx.drawImage(sadImage, 48, 8, 8, 8);
    }
    return;
  }

  // 爆擊訓練：顯示 牆 + bar + 龍
  if(trainingType === "critical"){
    // 牆在最左 x=0（破壞後顯示 Wall broken）
    const wImg = criticalWallBroken ? wallBrokenImage : wallImage;
    if(wImg.complete && wImg.naturalWidth > 0){
      ctx.drawImage(wImg, 0, 0, 16, 16);
    }

    // Critical Hit Bar 放在最右 x=48，根據 criticalPos 顯示對應的 cell
    // 慶祝（happy）或失敗（sad）時隱藏
    if(!trainingCelebrationActive && !trainingFailureActive && criticalBarImage.complete && criticalBarImage.naturalWidth > 0){
      ctx.drawImage(criticalBarImage, criticalPos * 16, 0, 16, 16, 48, 0, 16, 16);
    }

    // 成功動畫：雙火球 → BOOM → 牆變 broken
    if(trainingAttackActive){
      if(criticalAttackStep > 0){
        // 火球移動中（從 x=16 一格一格向左到 x=0）
        if(attackProjImage.complete && attackProjImage.naturalWidth > 0){
          ctx.drawImage(attackProjImage, 0, 0, 16, 8, criticalAttackStep, 0, 16, 8);
          ctx.drawImage(attackProjImage, 0, 0, 16, 8, criticalAttackStep, 8, 16, 8);
        }
      } else {
        // 火球到達牆壁，BOOM 動畫覆蓋牆位置
        const bImg = boomFrame === 0 ? boomImage : boomImage2;
        if(bImg.complete && bImg.naturalWidth > 0){
          ctx.drawImage(bImg, 0, 0, 16, 16);
        }
      }
      // 龍在 x=32 攻擊
      if(rowImages[currentRow] && rowImages[currentRow].complete && rowImages[currentRow].naturalWidth > 0){
        ctx.drawImage(rowImages[currentRow], 11 * PITCH, 0, 16, 16, 32, 0, 16, 16);
      }
    } else {
      // 龍在 x=32
      if(rowImages[currentRow] && rowImages[currentRow].complete && rowImages[currentRow].naturalWidth > 0){
        ctx.drawImage(rowImages[currentRow], dragonFrame * PITCH, 0, 16, 16, 32, 0, 16, 16);
      }
    }

    // 慶祝 happy icons
    if(trainingCelebrationActive && happyImage.complete && happyImage.naturalWidth > 0
       && TRAINING_CELEBRATION_SEQ[trainingCelebrationStep] === 7){
      ctx.drawImage(happyImage, 24, 0, 8, 8);
      ctx.drawImage(happyImage, 24, 8, 8, 8);
      ctx.drawImage(happyImage, 48, 0, 8, 8);
      ctx.drawImage(happyImage, 48, 8, 8, 8);
    }
    // 失敗 sad icons
    if(trainingFailureActive && sadImage.complete && sadImage.naturalWidth > 0
       && TRAINING_FAILURE_SEQ[trainingFailureStep] === 10){
      ctx.drawImage(sadImage, 24, 0, 8, 8);
      ctx.drawImage(sadImage, 24, 8, 8, 8);
      ctx.drawImage(sadImage, 48, 0, 8, 8);
      ctx.drawImage(sadImage, 48, 8, 8, 8);
    }
    return;
  }

  // 攻擊訓練：原來的布局
  // 1) 最左側訓練靶子 (x=0)，依狀態顯示不同圖
  if(sandbagState === "hit"){
    // 被打中後：顯示 Sandbag03
    if(sandbagImage3.complete && sandbagImage3.naturalWidth > 0){
      ctx.drawImage(sandbagImage3, 0, 0, 16, 16);
    }
  } else if(sandbagState === "boom"){
    // 爆炸動畫：顯示 Boom01/Boom02
    const bImg = boomFrame === 0 ? boomImage : boomImage2;
    if(bImg.complete && bImg.naturalWidth > 0){
      ctx.drawImage(bImg, 0, 0, 16, 16);
    }
  } else {
    // 正常狀態：靜止顯示 Sandbag01
    if(sandbagImage.complete && sandbagImage.naturalWidth > 0){
      ctx.drawImage(sandbagImage, 0, 0, 16, 16);
    }
  }
  
  // 2) 龍在中間（x=32）
  if(rowImages[currentRow] && rowImages[currentRow].complete && rowImages[currentRow].naturalWidth > 0){
    ctx.drawImage(
      rowImages[currentRow],
      dragonFrame * PITCH, 0,
      16, 16,
      32, 0,
      16, 16
    );
  }
  
  // 慶祝時只在 happy 幀顯示愛心
  if(trainingCelebrationActive && happyImage.complete && happyImage.naturalWidth > 0
     && TRAINING_CELEBRATION_SEQ[trainingCelebrationStep] === 7){
    ctx.drawImage(happyImage, 24, 0, 8, 8);
    ctx.drawImage(happyImage, 24, 8, 8, 8);
    ctx.drawImage(happyImage, 48, 0, 8, 8);
    ctx.drawImage(happyImage, 48, 8, 8, 8);
  }
  // 失敗時只在 sad 幀顯示難過圖
  if(trainingFailureActive && sadImage.complete && sadImage.naturalWidth > 0
     && TRAINING_FAILURE_SEQ[trainingFailureStep] === 10){
    ctx.drawImage(sadImage, 24, 0, 8, 8);
    ctx.drawImage(sadImage, 24, 8, 8, 8);
    ctx.drawImage(sadImage, 48, 0, 8, 8);
    ctx.drawImage(sadImage, 48, 8, 8, 8);
  }
  
  // Power 在龍右側（x=48），攻擊完成後隱藏
  if(!trainingPowerHidden){
    if(powerImage.complete && powerImage.naturalWidth > 0){
      const powerFrame = Math.min(trainingLevel, 5);
      ctx.drawImage(
        powerImage,
        powerFrame * 16, 0, 16, 16,
        48, 0,
        16, 16
      );
    } else {
      ctx.fillStyle = "#ff0";
      ctx.fillRect(49, 1, 14, 14);
    }
  }
  
  // 攻擊彈在龍左方，火球連續移動（精靈 16×8 繪於上方）
  if(trainingAttackActive && attackProjImage.complete && attackProjImage.naturalWidth > 0){
    ctx.drawImage(attackProjImage, trainingProjectileX, 0, 16, 8);
  }
}

// ========== 功能按鈕 ==========

// ========== 自動存檔 ==========
const SAVE_KEY = "digimon_vpet_save";
function saveGameState(){
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      gameAge,
      gameHunger,
      currentRow,
      timestamp: Date.now()
    }));
  } catch(e){ /* 忽略存檔錯誤 */ }
}
function loadGameState(){
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return;
    const data = JSON.parse(raw);
    const elapsed = Math.floor((Date.now() - data.timestamp) / 60000); // 經過分鐘
    gameAge = (data.gameAge || 0) + elapsed;
    gameHunger = Math.max(0, (data.gameHunger ?? 5) - Math.floor(elapsed / 30));
    currentRow = data.currentRow ?? 2;
  } catch(e){ /* 忽略讀檔錯誤 */ }
}

function buildFunctionButtons(){
  const panel = document.getElementById('btnPanel');
  panel.innerHTML = '';
  for(let i=0; i<FUNCTION_BTNS.length; i++){
    const btn = document.createElement('button');
    btn.className = 'func-btn';
    btn.textContent = FUNCTION_BTNS[i];
    btn.dataset.idx = i;
    btn.onclick = () => clickFunction(i);
    panel.appendChild(btn);
  }
}

function clickFunction(idx){
  const btn = document.querySelector(`.func-btn[data-idx="${idx}"]`);
  if(!btn) return;
  btn.classList.add('active');
  setTimeout(() => btn.classList.remove('active'), 200);
  console.log(`功能: ${FUNCTION_BTNS[idx]}`);
  if(idx === 0) showStats();   // 狀態
  else if(idx === 1) showFood(); // 食物
  else if(idx === 2) startTraining(); // 訓練
  else if(idx === 7) showDigidex(); // 圖鑑
}

function showStats(){
  const panel = document.getElementById("statsDisplay");
  const foodPanel = document.getElementById("foodDisplay");
  const s = DIGIMON_STATS[currentRow];
  if(!s) return;
  // 若已顯示則關閉
  if(panel.style.display === "block"){
    panel.style.display = "none";
    return;
  }
  // 關閉其他面板
  foodPanel.style.display = "none";
  document.getElementById("digidexDisplay").style.display = "none";
  document.getElementById("trainingDisplay").style.display = "none";
  const years = Math.floor(gameAge / 1440);
  const hours = Math.floor((gameAge % 1440) / 60);
  const mins = gameAge % 60;
  const hpLost = Math.max(0, Math.floor((10 - gameHunger) * s.hp / 20));
  const hearts = "❤️".repeat(gameHunger) + "🖤".repeat(10 - gameHunger);
  document.getElementById("sdName").textContent = s.name;
  document.getElementById("sdAge").textContent = `${years}歲:${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}`;
  document.getElementById("sdHunger").innerHTML = hearts;
  document.getElementById("sdHp").textContent = `${s.hp - hpLost} / ${s.hp}`;
  document.getElementById("sdAtk").textContent = s.atk;
  document.getElementById("sdDouble").textContent = `${s.doubleAtk}%`;
  document.getElementById("sdSpeed").textContent = s.speed;
  document.getElementById("sdEvade").textContent = `${s.evade}%`;
  panel.style.display = "block";
}

function showFood(){
  const panel = document.getElementById("foodDisplay");
  const statsPanel = document.getElementById("statsDisplay");
  // 若食物面板已顯示則關閉
  if(panel.style.display === "block"){
    panel.style.display = "none";
    return;
  }
  // 關閉狀態面板與圖鑑面板
  statsPanel.style.display = "none";
  document.getElementById("digidexDisplay").style.display = "none";
  document.getElementById("trainingDisplay").style.display = "none";
  panel.style.display = "block";
}

// ========== 圖鑑 ==========
function createMiniSprite(row, size){
  const c = document.createElement('canvas');
  c.width = 16; c.height = 16;
  const cx = c.getContext('2d');
  cx.imageSmoothingEnabled = false;
  cx.drawImage(rowImages[row], 0, 0, 16, 16, 0, 0, 16, 16);
  // 設 CSS 尺寸，保持畫素感
  c.style.width = size + 'px';
  c.style.height = size + 'px';
  return c;
}

function showDigidex(){
  const panel = document.getElementById("digidexDisplay");
  const statsPanel = document.getElementById("statsDisplay");
  const foodPanel = document.getElementById("foodDisplay");
  if(panel.style.display === "block"){ panel.style.display = "none"; return; }
  statsPanel.style.display = "none";
  foodPanel.style.display = "none";
  document.getElementById("trainingDisplay").style.display = "none";

  const container = document.getElementById("digidexContent");
  container.innerHTML = "";
  for(const stage of DIGIDEX_STAGES){
    const stageDiv = document.createElement('div');
    stageDiv.className = 'digidex-stage';

    const title = document.createElement('div');
    title.className = 'digidex-stage-title';
    title.textContent = stage.name;
    stageDiv.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'digidex-grid';

    for(const row of stage.rows){
      const entry = document.createElement('div');
      entry.className = 'digidex-entry';
      const sprite = createMiniSprite(row, 48);
      entry.appendChild(sprite);
      const nameSpan = document.createElement('div');
      nameSpan.className = 'd-name';
      nameSpan.textContent = ALL_NAMES[row] || `row_${String(row).padStart(2,'0')}`;
      entry.appendChild(nameSpan);
      // 僅供瀏覽，不切換數碼獸
      grid.appendChild(entry);
    }

    stageDiv.appendChild(grid);
    container.appendChild(stageDiv);
  }

  panel.style.display = "block";
}

function feedDigimon(food){
  // 關閉食物面板與圖鑑面板
  document.getElementById("foodDisplay").style.display = "none";
  document.getElementById("digidexDisplay").style.display = "none";
  if(gameMode !== "auto") return; // 動畫進行中不可操作

  if(food === "meat"){
    if(gameHunger >= 10){
      // 拒絕：搖晃動畫
      gameMode = "refusing";
      gameModeStep = 0;
      if(autoMoveTimer){ clearInterval(autoMoveTimer); autoMoveTimer = null; }
      restartAnimTimer(REFUSE_IV);
      return;
    }
    gameHunger = Math.min(10, gameHunger + 1);
    // 進食：eat1/eat2 動畫，龍在右邊，食物從左到右
    gameMode = "eating";
    gameModeStep = 0;
    autoX = 14;
    autoTargetX = null;
    if(autoMoveTimer){ clearInterval(autoMoveTimer); autoMoveTimer = null; }
    restartAnimTimer(EAT_IV);
    saveGameState();
    renderFrame();
    console.log(`餵食: ${food}, 飽食度: ${gameHunger}`);
  }
}

// ========== 選擇數碼獸（由箭頭控制） ==========
function selectDigimon(idx){
  currentRow = idx;
  gameMode = "auto";
  gameModeStep = 0;
  if(autoTimer) clearInterval(autoTimer);
  if(autoMoveTimer) clearInterval(autoMoveTimer);
  autoTimer = null;
  autoMoveTimer = null;
  autoX = 16;
  autoTargetX = null;
  autoAnimStep = 0;
  renderFrame();
  startAutoPlay();
}
