<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{
  background:#111;
  padding:16px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
.title{color:#fff;text-align:center;margin-bottom:16px;font-size:20px}

/* дё»LCDиһўе№• */
.main-screen{
  background:#000;
  border:3px solid #666;
  width:192px;
  height:96px;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  cursor:pointer;
  display:block;
  margin:0 auto 16px;
}

/* е·ҰеҸіеҲҮжҸӣз®ӯй ӯ */
.nav-bar{
  display:flex;
  justify-content:center;
  gap:24px;
  margin-bottom:30px;
}
.arrow-btn{
  width:80px;height:50px;
  font-size:26px;
  background:#333;
  color:#fff;
  border:none;
  border-radius:8px;
}

/* дёӯй–“8еҖӢеҠҹиғҪжҢүйҲ• */
.btn-panel{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:auto;
}
.func-btn{
  height:60px;
  background:#333;
  border:none;
  border-radius:8px;
  color:#fff;
  font-size:14px;
}
.func-btn.active{
  background:#c42222;
  color:#fff;
  font-weight:700;
}

/* й ҒйқўжңҖеә•йғЁе°ҺиҲӘж¬„ */

/* зӢҖж…ӢйқўжқҝпјҲжҢүйҲ•дёӢж–№пјү */
.stats-display{
  display:none;
  background:#222;
  border:1px solid #c42222;
  border-radius:8px;
  padding:12px 16px;
  color:#fff;

  width:100%;
  max-width:400px;
  margin:8px auto 0;
  box-sizing:border-box;
}
.stats-display .sd-title{
  text-align:center;
  font-size:16px;
  font-weight:700;
  color:#ffcc00;
  margin-bottom:8px;
  padding-bottom:6px;
  border-bottom:1px solid #444;
}
.stats-display .sd-row{
  display:flex;
  justify-content:space-between;
  padding:3px 0;
  border-bottom:1px solid #333;
}
.stats-display .sd-row span:first-child{ color:#aaa; }
.stats-display .sd-row span:last-child{ color:#fff; font-weight:600; }

/* йЈҹзү©йқўжқҝйҒёй … */
.food-item{
  padding:8px 12px;
  margin:4px 0;
  background:#333;
  border-radius:6px;
  cursor:pointer;
  font-size:15px;
  color:#fff;
  transition:background .15s;
}
.food-item:hover{ background:#555; }
.food-item:active{ background:#c42222; }

/* иЁ“з·ҙйқўжқҝ */
.training-mode-selector{
  display:flex;
  flex-direction:column;
  gap:4px;
  margin-bottom:8px;
}
.training-mode-btn{
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex:1;
  padding:6px;
  background:#333;
  color:#fff;
  border:2px solid #888;
  border-radius:4px;
  font-size:12px;
  font-family:inherit;
  cursor:pointer;
  user-select:none;
}
.training-mode-btn.active{
  background:#333;
  border-color:#fff;
}
.training-mode-btn .help-icon{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:18px;height:18px;
  background:#555;
  color:#ffcc00;
  border:1px solid #aaa;
  border-radius:50%;
  font-size:11px;
  font-weight:700;
  cursor:pointer;
  flex-shrink:0;
  line-height:1;
}
.training-click-btn{
  width:100%;
  max-width:360px;
  height:70px;
  background:#c42222;
  color:#fff;
  border:none;
  border-radius:10px;
  font-size:26px;
  font-weight:700;
  cursor:pointer;
  margin-top:8px;
}
.training-click-btn:active{ background:#ff4444; }
.training-timer{
  position:absolute;
  left:50%;
  top:-150px;
  transform:translateX(-50%);
  font-size:48px;
  font-weight:bold;
  color:#ff0;
  text-shadow:2px 2px 0 #000;
}
.training-back-btn{
  display:block;
  margin:8px auto 0;
  padding:8px 24px;
  background:#555;
  color:#fff;
  border:none;
  border-radius:6px;
  font-size:14px;
  cursor:pointer;
}

/* ең–й‘‘йқўжқҝ */
.digidex-stage{
  margin-bottom:12px;
}
.digidex-stage-title{
  color:#ffcc00;
  font-size:14px;
  font-weight:700;
  margin-bottom:6px;
  padding-bottom:4px;
  border-bottom:1px solid #444;
}
.digidex-grid{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.digidex-entry{
  display:flex;
  flex-direction:column;
  align-items:center;
  background:#333;
  border-radius:6px;
  padding:8px;
  width:72px;
  cursor:pointer;
  transition:background .15s;
}
.digidex-entry:hover{ background:#555; }
.digidex-entry canvas{
  display:block;
  width:48px;
  height:48px;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  margin-bottom:4px;
}
.digidex-entry .d-name{
  font-size:11px;
  color:#fff;
  text-align:center;
  word-break:break-all;
}

<body>

<!-- иЁ“з·ҙйқўжқҝ -->
<div class="stats-display" id="trainingDisplay" style="display:none;">
  <div class="sd-title">иЁ“з·ҙ</div>
  <!-- жЁЎејҸйҒёж“Ү -->
  <div id="trainingModeSelect">
    <div class="training-mode-selector">

      <div class="training-mode-btn" id="trainingModeCritical" data-mode="critical">

    <div id="trainingHelpPopup" style="display:none;background:#1a1a2e;border:1px solid #ffcc00;border-radius:6px;padding:8px 10px;margin-bottom:8px;font-size:12px;color:#ddd;line-height:1.6;"></div>

  <div id="trainingPlayView" style="display:none; text-align:center; position:relative;">
    <div id="trainingTimerDisplay" class="training-timer">3</div>
    <button class="training-click-btn" id="trainingClickBtn">й»һж“Ҡ</button>
    <button class="training-back-btn" id="trainingModeBackBtn">иҝ”еӣһйҒёж“Ү</button>
  </div>
</div>

<!-- ең–й‘‘йқўжқҝ -->
<div class="stats-display" id="digidexDisplay" style="display:none;">
  <div class="sd-title">ең–й‘‘</div>
  <div id="digidexContent"></div>

<script>
const canvas = document.getElementById('screen');
const ctx = canvas.getContext('2d');

// ========== еҸғж•ёиЁӯе®ҡ ==========
const CELL_SIZE = 16;
const GAP = 1;
const PITCH = CELL_SIZE + GAP; // 17
const ROWS = 18;
const COLS = 12;
const FRAME_LABELS = ["idle","idle","eat","eat","sleep","sleep","refuse","happy","angry","hurt","sad","attack"];
const DIGIMON_NAMES = ["Botamon","Koromon","Agumon","Greymon","MetalGreymon","WarGreymon","Omegamon"];

// ========== ең–й‘‘иіҮж–ҷ ==========
const DIGIDEX_STAGES = [
  { name: "е№је№ҙжңҹ",   rows: [0] },
  { name: "е№је№ҙжңҹв…Ў", rows: [1] },
  { name: "жҲҗй•·жңҹ",   rows: [2, 3] },
  { name: "жҲҗзҶҹжңҹ",   rows: [4, 5, 6, 7, 8, 9, 10] },
  { name: "е®Ңе…Ёй«”",   rows: [11, 12, 13] },
];
// жүҖжңү sprite row зҡ„еҗҚзЁұпјҲ0пҪһ13пјү
const ALL_NAMES = [
  "й»‘зҗғзҚё","ж»ҫзҗғзҚё","дәһеҸӨзҚё","иІқеЎ”зҚё",
  "жҡҙйҫҚзҚё","е·ЁйҫҚзҚё","жғЎйӯ”зҚё","зҒ«з„°зҚё","йЈӣйҫҚзҚё","жө·йҫҚзҚё","йј»ж¶•зҚё",
  "ж©ҹжў°жҡҙйҫҚзҚё(и—Қ)","иұҶиұҶзҚё","й–Җе·ҰиЎӣзҚё",
];

// зІҫйқҲең–и·Ҝеҫ‘пјҲзҚЁз«ӢиЎҢең–зүҮпјү
const BG_NAMES = ["Normal", "Noon", "dusk", "Night"];

let rowImages = new Array(18); // row_00.png ~ row_17.png
let meatImage = new Image();
let bgImages = {};
let currentBgName = "Normal";

function getBgNameByHour(h) {
  if (h >= 19 || h < 5) return "Night";
  if (h >= 5 && h < 7) return "dusk";
  if (h >= 7 && h < 10) return "Normal";
  if (h >= 10 && h < 14) return "Noon";
  if (h >= 14 && h < 17) return "Normal";
  return "dusk"; // 17:00-18:59
}

function updateBgByTime() {
  const name = getBgNameByHour(new Date().getHours());
  if (name !== currentBgName) {
    currentBgName = name;
    renderFrame();
  }
}
let currentRow = 2;    // зӣ®еүҚйҒёж“Үзҡ„ж•ёзўјзҚё row
// з•¶еүҚе ҙжҷҜпјҲзӣ®еүҚеғ…з”ЁдҫҶжұәе®ҡжёІжҹ“иЎҢзӮәпјү

// ========== иҮӘеӢ•еӢ•з•«и®Ҡж•ё ==========
let autoX = 9;            // 1~17 йҖЈзәҢеә§жЁҷпјҲ16px зІҫйқҲеңЁ 32px з•«еёғе…§пјү
let autoTargetX = null;
let autoAnimStep = 0;
const ANIM_IV = 800;
const EDGE_IV = 500;
const MOVE_IV = 2000;
const EDGE_SEQ = [0, 11, 11, 0];
const MID_SEQ  = [0, 0, 0, 1];
let autoAnimIv = ANIM_IV;
let autoTimer = null;
let autoMoveTimer = null;

// ========== йҖІйЈҹ/жӢ’зө• жЁЎејҸи®Ҡж•ё ==========
let gameMode = "auto";       // "auto" | "eating" | "refusing"
let gameModeStep = 0;
const EAT_IV = 400;
const REFUSE_IV = 300;

// ========== з№ӘиЈҪ ==========
function getColForAuto(){
  const isEdge = autoX <= 1 || autoX >= 17;
  const isMoving = autoTargetX !== null;
  if(isEdge && !isMoving) return EDGE_SEQ[autoAnimStep % 4];
  return MID_SEQ[autoAnimStep % 4];
}

function renderFrame(){
  if(trainingMode){
    renderTrainingCanvas();
    return;
  }
  ctx.fillStyle="#000";
  ctx.fillRect(0,0,32,16);
  // иғҢжҷҜпјҲж №ж“ҡзӣ®еүҚжҷӮй–“пјү
  ctx.drawImage(bgImages[currentBgName] || bgImages["Normal"], 0, 0, 32, 16);

  if(gameMode === "eating"){
    // йҖІйЈҹжЁЎејҸпјҡйҫҚеңЁеҸійӮҠеҗ‘е·ҰпјҢйЈҹзү©еӣәе®ҡпјҢеӢ•з•«дҫқеәҸеҲҮжҸӣ 4 е№Җ
    const col = (gameModeStep % 2 === 0) ? 2 : 3; // eat1 / eat2
    const foodX = 0;                                // йЈҹзү©еӣәе®ҡеңЁе·ҰеҒҙ
    const foodFrame = Math.floor((gameModeStep + 1) / 2); // еҸӘеңЁ EAT2 жҷӮйҖІе№Җ
    // з•«иӮү
    if(meatImage.complete && meatImage.naturalWidth > 0){
      ctx.drawImage(
        meatImage,
        foodFrame * CELL_SIZE, 0, CELL_SIZE, CELL_SIZE,
        foodX, 0, CELL_SIZE, CELL_SIZE
      );
    }
    // йҫҚеңЁеҸійӮҠ (autoX=14)пјҢйқўеҗ‘е·ҰпјҲй җиЁӯж–№еҗ‘пјү
    ctx.drawImage(
      rowImages[currentRow],
      col * PITCH, 0,
      CELL_SIZE, CELL_SIZE,
      16, 0,  // йҫҚйқ еҸійӮҠз«ҷдҪҚ
      CELL_SIZE, CELL_SIZE
    );
    return;
  }

  if(gameMode === "refusing"){
    // жӢ’зө•жЁЎејҸпјҡйҫҚеңЁдёӯй–“е·ҰеҸійқўеҗ‘дәӨжӣҝпјҲе·ҰвҶ’еҸівҶ’е·ҰвҶ’еҸіпјү
    const faceFlip = gameModeStep % 2 === 0;
    ctx.save();
    let drawX = 8;
    if(faceFlip){
      ctx.translate(32, 0);
      ctx.scale(-1, 1);
      drawX = 16 - 8; // зҝ»иҪүеҫҢеә§жЁҷж ЎжӯЈ
    }
    ctx.drawImage(
      rowImages[currentRow],
      6 * PITCH, 0,  // col 6 = refuse frame, source y=0
      CELL_SIZE, CELL_SIZE,
      drawX, 0,
      CELL_SIZE, CELL_SIZE
    );
    ctx.restore();
    return;
  }

  // жҷ®йҖҡжЁЎејҸ
  const colIndex = getColForAuto();
  const faceRight = (autoTargetX !== null && autoX < autoTargetX) || (autoTargetX === null && autoX >= 9);
  const spriteX = autoX - 1;

  ctx.save();
  let drawX = spriteX;
  if(faceRight){
    ctx.translate(32, 0);
    ctx.scale(-1, 1);
    drawX = 16 - spriteX; // зҝ»иҪ¬еҫҢеә§жЁҷж ЎжӯЈ
  }
  ctx.drawImage(
    rowImages[currentRow],
    colIndex * PITCH, 0,
    CELL_SIZE, CELL_SIZE,
    drawX, 0,
    CELL_SIZE, CELL_SIZE
  );
  ctx.restore();
}

// ========== еӢ•з•« / з§»еӢ• ==========
function stepAutoAnim(){
  // йҖІйЈҹжЁЎејҸ
  if(gameMode === "eating"){
    gameModeStep++;
    if(gameModeStep >= 6){
      gameMode = "auto";
      gameModeStep = 0;
      // еӢ•з•«зөҗжқҹеҫҢиө°еӣһдёӯй–“
      autoTargetX = 9;
      autoAnimStep = 0;
      restartAnimTimer(ANIM_IV);
      if(!autoMoveTimer) autoMoveTimer = setInterval(stepAutoMove, MOVE_IV);
      renderFrame();
      return;
    }
    renderFrame();
    return;
  }
  // жӢ’зө•жЁЎејҸпјҲжҗ–жҷғпјү
  if(gameMode === "refusing"){
    gameModeStep++;
    if(gameModeStep >= 8){
      gameMode = "auto";
      gameModeStep = 0;
      autoAnimStep = 0;
      autoTargetX = 9;
      restartAnimTimer(ANIM_IV);
      if(!autoMoveTimer) autoMoveTimer = setInterval(stepAutoMove, MOVE_IV);
      renderFrame();
      return;
    }
    renderFrame();
    return;
  }
  // жҷ®йҖҡжЁЎејҸ
  let justLanded = false;
  if(autoTargetX !== null){
    const step = autoX < autoTargetX ? 1 : -1;
    autoX += step;
    if(Math.abs(autoX - autoTargetX) < 0.5 ||
       (step > 0 && autoX >= autoTargetX) ||
       (step < 0 && autoX <= autoTargetX)){
      autoX = autoTargetX;
      autoTargetX = null;
      justLanded = true;
    }
  }
  if(justLanded && (autoX <= 1 || autoX >= 17)) {
    autoAnimStep = -1;
  }
  autoAnimStep++;
  renderFrame();
  const isEdge = autoX <= 1 || autoX >= 17;
  if(isEdge && autoTargetX === null && autoAnimIv !== EDGE_IV){
    restartAnimTimer(EDGE_IV);
  } else if(!isEdge && autoAnimIv !== ANIM_IV){
    restartAnimTimer(ANIM_IV);
  }
}

function stepAutoMove(){
  if(autoTargetX !== null) return;
  const isEdge = autoX <= 1 || autoX >= 17;
  if(isEdge){
    if(autoAnimStep < 5) return;
    autoTargetX = 9;
  } else {
    if(Math.random() < 0.1) return;
    const dir = Math.random() < 0.5 ? -1 : 1;
    const t = autoX + dir * 5;
    autoTargetX = Math.max(1, Math.min(17, t));
    if(autoTargetX === autoX) return;
  }
  autoAnimStep = 0;
}

function restartAnimTimer(iv){
  if(autoAnimIv === iv) return;
  if(autoTimer) clearInterval(autoTimer);
  autoAnimIv = iv;
  autoTimer = setInterval(stepAutoAnim, iv);
}

function startAutoPlay(){
  updateBgByTime(); // йҰ–ж¬Ўж №ж“ҡжҷӮй–“иЁӯе®ҡиғҢжҷҜ
  autoX = 9;
  autoTargetX = null;
  autoAnimStep = 0;
  autoAnimIv = ANIM_IV;
  autoTimer = setInterval(stepAutoAnim, ANIM_IV);
  autoMoveTimer = setInterval(stepAutoMove, MOVE_IV);
  renderFrame();
}

// ========== иЁ“з·ҙзі»зөұ ==========
let trainingMode = false;
let trainingLevel = 0;       // 0~6, е·Іе……иғҪж јж•ё
let trainingClickCount = 0;  // й»һж“Ҡж¬Ўж•ёпјҲжҜҸ2ж¬Ў+1зҙҡпјү
let trainingAttackActive = false;
let trainingProjectileX = 0;
let trainingProjectileTimer = null;
let powerImage = new Image();
let attackProjImage = new Image();
let tbgImage = new Image();  // иЁ“з·ҙиғҢжҷҜ
let sandbagImage = new Image();
let sandbagImage2 = new Image();
let sandbagImage3 = new Image();  // иў«жү“дёӯеҫҢзҡ„жІҷеҢ…
let boomImage = new Image();      // зҲҶзӮё01
let boomImage2 = new Image();     // зҲҶзӮё02
let happyImage = new Image();    // ж…¶зҘқж„ӣеҝғ
let sandbagState = "normal";     // "normal" | "boom" | "hit"

function selectTrainingType(type){
  if(trainingAttackActive || trainingCelebrationActive || trainingFailureActive) return;
  trainingType = type;
  document.getElementById("trainingModeAttack").classList.toggle("active", type === "attack");
  document.getElementById("trainingModeLife").classList.toggle("active", type === "life");
  document.getElementById("trainingModeCritical").classList.toggle("active", type === "critical");
  // йҒёе®ҢеҫҢзӣҙжҺҘй–Ӣе§ӢеҖ’ж•ё
  startTrainingPlay();
}

function startTraining(){
  const trainPanel = document.getElementById("trainingDisplay");
  
  // иӢҘиЁ“з·ҙйқўжқҝе·ІйЎҜзӨәеүҮй—ңй–үпјҲеҲҮжҸӣпјү
  if(trainPanel.style.display === "block"){
    stopTraining();
    return;
  }
  
  // й—ңй–үе…¶д»–йқўжқҝ
  document.getElementById("statsDisplay").style.display = "none";
  document.getElementById("foodDisplay").style.display = "none";
  document.getElementById("digidexDisplay").style.display = "none";
  
  // жҡ«еҒңиҮӘеӢ•жЁЎејҸ
  if(autoTimer) clearInterval(autoTimer);
  if(autoMoveTimer) clearInterval(autoMoveTimer);
  autoTimer = null;
  autoMoveTimer = null;
  
  trainingMode = true;
  trainingLevel = 0;
  trainingClickCount = 0;
  trainingAttackActive = false;
  trainingIdleFrame = 0;
  if(trainingProjectileTimer){
    clearInterval(trainingProjectileTimer);
    trainingProjectileTimer = null;
  }
  if(trainingIdleTimer){
    clearInterval(trainingIdleTimer);
    trainingIdleTimer = null;
  }
  if(sandbagTimer){
    clearInterval(sandbagTimer);
    sandbagTimer = null;
  }
  if(boomTimer){
    clearInterval(boomTimer);
    boomTimer = null;
  }
  trainingProjectileX = 0;
  sandbagState = "normal";
  boomFrame = 0;
  boomCycle = 0;
  
  // й–Ӣ idle еӢ•з•«е®ҡжҷӮеҷЁпјҲеҲҮжҸӣ idle1/idle2пјү
  trainingIdleTimer = setInterval(() => {
    trainingIdleFrame = trainingIdleFrame === 0 ? 1 : 0;
    renderFrame();
  }, 800);
  
  // йҮҚзҪ®ж…¶зҘқзӢҖж…Ӣ
  trainingPowerHidden = false;
  trainingCelebrationActive = false;
  trainingCelebrationStep = 0;
  if(trainingCelebrationTimer){
    clearInterval(trainingCelebrationTimer);
    trainingCelebrationTimer = null;
  }

  // йҮҚзҪ®еӨұж•—зӢҖж…Ӣ
  trainingFailed = false;
  trainingFailureActive = false;
  trainingFailureStep = 0;
  if(trainingFailureTimer){
    clearInterval(trainingFailureTimer);
    trainingFailureTimer = null;
  }
  if(trainingTimer){
    clearInterval(trainingTimer);
    trainingTimer = null;
  }
  document.getElementById("trainingTimerDisplay").textContent = "";
  lifePhase = "play";

  // й җиЁӯжЁЎејҸпјҲй«ҳдә® 1. ж”»ж“ҠиЁ“з·ҙпјү
  trainingType = "attack";
  document.getElementById("trainingModeAttack").classList.add("active");
  document.getElementById("trainingModeLife").classList.remove("active");
  document.getElementById("trainingModeCritical").classList.remove("active");
  // йЎҜзӨәжЁЎејҸйҒёж“ҮпјҢйҡұи—Ҹй–Ӣе§ӢиЁ“з·ҙиҰ–ең–
  document.getElementById("trainingModeSelect").style.display = "block";

  // дё» canvas еҜ¬еәҰж”№зӮә 64

function startTrainingPlay(){
  // еҫһжЁЎејҸйҒёж“ҮеҲҮжҸӣеҲ°й–Ӣе§ӢиЁ“з·ҙиҰ–ең–пјҢдёҰе•ҹеӢ• 3 з§’еҖ’ж•ё
  if(trainingAttackActive || trainingCelebrationActive || trainingFailureActive) return;

  document.getElementById("trainingModeSelect").style.display = "none";
  document.getElementById("trainingPlayView").style.display = "block";

  // йҮҚзҪ®е……иғҪзӢҖж…Ӣ
  trainingLevel = 0;
  trainingClickCount = 0;
  trainingPowerHidden = false;
  // йҮҚзҪ®з”ҹе‘ҪиЁ“з·ҙзӢҖж…ӢпјҲйҡЁж©ҹ 2~4 еҖӢ pointпјү
  lifePointsRemaining = Math.floor(Math.random() * 3) + 2;
  lifeShieldBroken = false;
  lifePhase = "play";

  // зҲҶж“ҠиЁ“з·ҙпјҡдёҚиЁҲжҷӮпјҢж”№ bar з§»еӢ•
  if(trainingType === "critical"){
    document.getElementById("trainingTimerDisplay").textContent = "";
    criticalWallBroken = false;
    startCriticalBar();
    renderFrame();
    return;
  }

  // й–Ӣе§ӢеҖ’ж•ёиЁҲжҷӮпјҲUI жҜҸз§’жӣҙж–°пјү
  trainingCountdown = (trainingType === "life") ? 2 : 3;
  document.getElementById("trainingTimerDisplay").textContent = trainingCountdown;
  trainingTimer = setInterval(() => {
    trainingCountdown--;
    document.getElementById("trainingTimerDisplay").textContent = trainingCountdown;
    if(trainingCountdown <= 0){
      clearInterval(trainingTimer);
      trainingTimer = null;
      document.getElementById("trainingTimerDisplay").textContent = "";
      // з”ҹе‘ҪиЁ“з·ҙпјҡ4 еҖӢй»һе…Ёж¶ҲеӨұ = жҲҗеҠҹпјҢеҗҰеүҮеӨұж•—
      if(trainingType === "life"){
        if(lifePointsRemaining <= 0 && !lifeShieldBroken){
          triggerTrainingAttack();
        } else {
          triggerTrainingFailure();
        }
      } else {
        triggerTrainingFailure();
      }
    }
  }, 1000);

  renderFrame();
}

  }

  trainingClickCount = 0;

  // зҲҶж“ҠиЁ“з·ҙжё…зҗҶ

function stopTraining(){
  trainingMode = false;
  if(trainingProjectileTimer){
    clearInterval(trainingProjectileTimer);
    trainingProjectileTimer = null;
  }
  if(trainingIdleTimer){
    clearInterval(trainingIdleTimer);
    trainingIdleTimer = null;
  }
  if(sandbagTimer){
    clearInterval(sandbagTimer);
    sandbagTimer = null;
  }
  if(boomTimer){
    clearInterval(boomTimer);
    boomTimer = null;
  }
  if(trainingCelebrationTimer){
    clearInterval(trainingCelebrationTimer);
    trainingCelebrationTimer = null;
  }
  if(trainingTimer){
    clearInterval(trainingTimer);
    trainingTimer = null;
  }
  document.getElementById("trainingTimerDisplay").textContent = "";
  if(trainingFailureTimer){
    clearInterval(trainingFailureTimer);
    trainingFailureTimer = null;
  }
  // з”ҹе‘ҪиЁ“з·ҙжҲҗеҠҹеӢ•з•«зҡ„иЁҲжҷӮеҷЁ
  if(lifeBoxingTimer){
    clearInterval(lifeBoxingTimer);
    lifeBoxingTimer = null;
  }
  if(lifeBoomTimer){
    clearInterval(lifeBoomTimer);
    lifeBoomTimer = null;
  }
  if(lifeShieldHoldTimer){
    clearTimeout(lifeShieldHoldTimer);
    lifeShieldHoldTimer = null;
  }
  if(lifeFailureHoldTimer){
    clearTimeout(lifeFailureHoldTimer);
    lifeFailureHoldTimer = null;
  }
  // зҲҶж“ҠиЁ“з·ҙиЁҲжҷӮеҷЁ
  if(criticalBarTimer){
    clearInterval(criticalBarTimer);
    criticalBarTimer = null;
  }
  if(criticalAttackTimer){
    clearInterval(criticalAttackTimer);
    criticalAttackTimer = null;
  }
  criticalBarActive = false;
  lifePhase = "play";
  document.getElementById("trainingDisplay").style.display = "none";
  // жҒўеҫ© canvas е°әеҜё
  canvas.width = CANVAS_NORMAL_W;
  canvas.style.width = "";
  // жҒўеҫ©иҮӘеӢ•жЁЎејҸ
  startAutoPlay();
}

function handleTrainingClick(){
  if(trainingAttackActive) return;  // ж”»ж“ҠеӢ•з•«дёӯдёҚеҸҜж“ҚдҪң
  if(trainingCelebrationActive) return; // ж…¶зҘқдёӯдёҚеҸҜж“ҚдҪң
  if(trainingFailed || trainingFailureActive) return; // еӨұж•—еҫҢдёҚеҸҜеҶҚй»һ
  
  // з”ҹе‘ҪиЁ“з·ҙйӮҸијҜ
  if(trainingType === "life"){
    if(lifeShieldBroken) return;
    if(lifePointsRemaining <= 0){
      // й»һе®ҢжүҖжңү point еҶҚй»һ вҶ’ зӣҫзүҢз ҙеЈһ = еӨұж•—
      lifeShieldBroken = true;
      if(trainingTimer){
        clearInterval(trainingTimer);
        trainingTimer = null;
      }
      document.getElementById("trainingTimerDisplay").textContent = "";
      triggerTrainingFailure();
      return;
    }
    lifePointsRemaining--;
    renderFrame();
    return;
  }

  // зҲҶж“ҠиЁ“з·ҙпјҡеҒңжӯў barпјҢеҲӨе®ҡжҲҗж•—
  if(trainingType === "critical"){
    if(!criticalBarActive) return;
    stopCriticalBar();
    return;
  }
  
  trainingClickCount++;
  // жҜҸ2ж¬Ўй»һж“Ҡеҗ‘еҸіз§»еӢ•1ж ј
  if(trainingClickCount % 2 === 0){
    trainingLevel++;
    if(trainingLevel >= TRAIN_SLOTS){
      // жҲҗеҠҹж»ҝиғҪ вҶ’ жё…йҷӨиЁҲжҷӮеҷЁпјҢи§ёзҷјж”»ж“Ҡ
      if(trainingTimer){
        clearInterval(trainingTimer);
        trainingTimer = null;
      }
      document.getElementById("trainingTimerDisplay").textContent = "";
      triggerTrainingAttack();
      return;
    }
  }
  renderFrame();
}

function triggerTrainingAttack(){
  trainingAttackActive = true;
  trainingLevel = 6;
  // зўәдҝқиЁҲжҷӮеҷЁжё…йҷӨ
  if(trainingTimer){
    clearInterval(trainingTimer);
    trainingTimer = null;
  }
  document.getElementById("trainingTimerDisplay").textContent = "";
  // ж”»ж“ҠжҷӮеҒңжӯў idle иҲҮжІҷеҢ…еӢ•з•«
  if(trainingIdleTimer){
    clearInterval(trainingIdleTimer);
    trainingIdleTimer = null;
  }
  if(sandbagTimer){
    clearInterval(sandbagTimer);
    sandbagTimer = null;
  }

  // з”ҹе‘ҪиЁ“з·ҙпјҡж–°зҡ„жҲҗеҠҹеӢ•з•«еәҸеҲ—пјҲboxing вҶ’ boom вҶ’ shield е®ҢеҘҪ вҶ’ йҫҚз§»еӢ• happyпјү
  if(trainingType === "life"){
    startLifeSuccessAnimation();
    return;
  }

  trainingProjectileX = 16;
  renderFrame();
  
  // зҒ«зҗғйҖЈзәҢжҜҸеғҸзҙ еҗ‘е·Ұз§»еӢ•
  trainingProjectileTimer = setInterval(() => {
    trainingProjectileX -= 1;
    renderFrame();
    if(trainingProjectileX <= 0){
      // зҒ«зҗғж“ҠдёӯжІҷеҢ… вҶ’ еҒңжӯўз§»еӢ•гҖҒи§ёзҷјзҲҶзӮё
      clearInterval(trainingProjectileTimer);
      trainingProjectileTimer = null;
      trainingAttackActive = false;
      startBoomSequence();
    } else if(trainingProjectileX < -16){
      // йҳІиӯ·пјҡиӢҘзӣҙжҺҘйЈӣйҒҺй ӯеүҮйҮҚзҪ®
      clearInterval(trainingProjectileTimer);
      trainingProjectileTimer = null;
      trainingAttackActive = false;
      endTrainingAttack();
    }
  }, 16);
}

function startBoomSequence(){
  // еҲҮжҸӣеҲ°зҲҶзӮёзӢҖж…Ӣ
  sandbagState = "boom";
  boomFrame = 0;
  boomCycle = 0;
  renderFrame();
  
  // жҜҸ 200ms еҲҮжҸӣзҲҶзӮёе№ҖпјҢ2 йҖұжңҹеҫҢзөҗжқҹ
  boomTimer = setInterval(() => {
    boomFrame = boomFrame === 0 ? 1 : 0;
    if(boomFrame === 0){
      boomCycle++; // е®ҢжҲҗдёҖеҖӢе®Ңж•ҙйҖұжңҹ (01вҶ’02)
    }
    if(boomCycle >= 2){
      clearInterval(boomTimer);
      boomTimer = null;
      // зҲҶзӮёзөҗжқҹ вҶ’ жҸӣжҲҗиў«жү“дёӯзҡ„жІҷеҢ…
      sandbagState = "hit";
      renderFrame();
      endTrainingAttack();
      return;
    }
    renderFrame();
  }, 200);
}

function endTrainingAttack(){
  // ж”»ж“Ҡ/зҲҶзӮёе®ҢжҲҗзҡ„жё…зҗҶиҲҮйҮҚзҪ®
  trainingLevel = 0;
  trainingClickCount = 0;
  trainingProjectileX = 0;
  trainingAttackActive = false;
  trainingPowerHidden = true;

  // еҒңжӯў idle е®ҡжҷӮеҷЁпјҲиӢҘжңүпјү
  if(trainingIdleTimer){
    clearInterval(trainingIdleTimer);
    trainingIdleTimer = null;
  }

  // й–Ӣе§Ӣж…¶зҘқеӢ•з•«пјҡidle вҶ’ happy вҶ’ idle вҶ’ happy
  trainingCelebrationActive = true;
  trainingCelebrationStep = 0;
  trainingCelebrationTimer = setInterval(() => {
    trainingCelebrationStep++;
    if(trainingCelebrationStep >= TRAINING_CELEBRATION_SEQ.length){
      // ж…¶зҘқзөҗжқҹпјҢиҮӘеӢ•иҝ”еӣһ
      clearInterval(trainingCelebrationTimer);
      trainingCelebrationTimer = null;
      trainingCelebrationActive = false;
      stopTraining();
    }
    renderFrame();
  }, 600);

  renderFrame();
}

function triggerTrainingFailure(){
  if(trainingAttackActive) return;  // ж”»ж“ҠдёӯдёҚз®—еӨұж•—
  if(trainingFailed) return;       // е·Із¶“еӨұж•—дәҶ
  if(trainingLevel >= TRAIN_SLOTS) return; // е·Іж»ҝдёҚз®—
  if(trainingFailureActive) return;

  // зўәдҝқиЁҲжҷӮеҷЁе·Іжё…йҷӨ
  if(trainingTimer){
    clearInterval(trainingTimer);
    trainingTimer = null;
  }
  document.getElementById("trainingTimerDisplay").textContent = "";

  trainingFailed = true;
  trainingFailureActive = true;
  trainingPowerHidden = true;

  // еҒңжӯў Idle еӢ•з•«
  if(trainingIdleTimer){
    clearInterval(trainingIdleTimer);
    trainingIdleTimer = null;
  }

  // з”ҹе‘ҪиЁ“з·ҙпјҡе…Ҳзӯү 1 з§’пјҲзӣҫзүҢе®ҢеҘҪпјүпјҢйҫҚеҶҚз§»еӢ•еҲ°зӣҫзүҢдҪҚзҪ® + SAD
  if(trainingType === "life"){
    lifePhase = "failureHold";      // зӯү 1 з§’пјҢйҫҚеңЁ x=48пјҢзӣҫзүҢе®ҢеҘҪ
    renderFrame();
    lifeFailureHoldTimer = setTimeout(() => {
      lifeFailureHoldTimer = null;
      lifePhase = "failure";        // зӣҫзүҢйҡұи—ҸпјҢйҫҚз§»еҲ°зӣҫзүҢдҪҚзҪ®
      lifeDragonMoveX = 32;
      // й–Ӣе§Ӣ SAD еӢ•з•«
      trainingFailureStep = 0;
      trainingFailureTimer = setInterval(() => {
        trainingFailureStep++;
        if(trainingFailureStep >= TRAINING_FAILURE_SEQ.length){
          clearInterval(trainingFailureTimer);
          trainingFailureTimer = null;
          trainingFailureActive = false;
          trainingFailed = false;
          stopTraining();
        }
        renderFrame();
      }, 600);
      renderFrame();
    }, 1000);
    return;
  }

  // е…¶д»–иЁ“з·ҙпјҡзӣҙжҺҘеӨұж•—еӢ•з•«
  trainingFailureStep = 0;
  trainingFailureTimer = setInterval(() => {
    trainingFailureStep++;
    if(trainingFailureStep >= TRAINING_FAILURE_SEQ.length){
      clearInterval(trainingFailureTimer);
      trainingFailureTimer = null;
      trainingFailureActive = false;
      trainingFailed = false;
      stopTraining();
    }
    renderFrame();
  }, 600);

  renderFrame();
}

// ========== з”ҹе‘ҪиЁ“з·ҙжҲҗеҠҹеӢ•з•« ==========
function startLifeSuccessAnimation(){
  // зўәдҝқиЁҲжҷӮеҷЁжё…йҷӨ
  if(trainingTimer){
    clearInterval(trainingTimer);
    trainingTimer = null;
  }
  document.getElementById("trainingTimerDisplay").textContent = "";
  if(trainingCelebrationTimer){
    clearInterval(trainingCelebrationTimer);
    trainingCelebrationTimer = null;
  }
  trainingCelebrationActive = false;
  trainingCelebrationStep = 0;
  trainingPowerHidden = true;

  // йҫҚдҝқжҢҒеҺҹжң¬дҪҚзҪ® x=48
  lifeDragonMoveX = 48;

  // йҡҺж®ө 1: boxing еҫһжңҖе·ҰдёҖж јдёҖж јеҗ‘еҸіз§»еӢ•еҲ°зӣҫзүҢ
  lifePhase = "boxing";
  lifeBoxingX = 0;
  renderFrame();

  let boxingStepCount = 0;
  lifeBoxingTimer = setInterval(() => {
    boxingStepCount++;
    if(boxingStepCount >= 32){
      // е·ІеҲ°йҒ”зӣҫзүҢдҪҚзҪ® (x=32)пјҢеҲҮеҲ° BOOM йҡҺж®ө
      clearInterval(lifeBoxingTimer);
      lifeBoxingTimer = null;
      lifePhase = "boom";
      startLifeBoom();
    } else {
      lifeBoxingX += 1; // жҜҸж¬Ўз§»еӢ• 1 еғҸзҙ 
      renderFrame();
    }
  }, 30);
}

function startLifeBoom(){
  // йЎҜзӨә BOOM еӢ•з•«иҰҶи“ӢзӣҫзүҢдҪҚзҪ®
  boomFrame = 0;
  boomCycle = 0;
  renderFrame();

  lifeBoomTimer = setInterval(() => {
    boomFrame = boomFrame === 0 ? 1 : 0;
    if(boomFrame === 0) boomCycle++;
    if(boomCycle >= 2){
      // BOOM зөҗжқҹ вҶ’ зӣҫзүҢе®ҢеҘҪйЎҜзӨә 1 з§’
      clearInterval(lifeBoomTimer);
      lifeBoomTimer = null;
      lifePhase = "shieldHold";
      renderFrame();
      lifeShieldHoldTimer = setTimeout(() => {
        lifeShieldHoldTimer = null;
        // зӣҫзүҢйҡұи—ҸпјҢйҫҚз§»еӢ•еҲ°зӣҫзүҢдҪҚзҪ® + happy
        lifePhase = "celebration";
        startLifeCelebration();
      }, 1000);
      return;
    }
    renderFrame();
  }, 200);
}

function startLifeCelebration(){
  lifeDragonMoveX = 48;
  trainingCelebrationActive = true;
  trainingCelebrationStep = 0;
  trainingAttackActive = false; // ж…¶зҘқйҡҺж®өз”ұ trainingCelebrationActive йҳ»ж“Ӣж“ҚдҪң

  trainingCelebrationTimer = setInterval(() => {
    trainingCelebrationStep++;
    // йҫҚеңЁж…¶зҘқйҒҺзЁӢдёӯеҫһ x=48 з§»еӢ•еҲ° x=32пјҲзӣҫзүҢдҪҚзҪ®пјҢеҫһеҸіеҲ°е·Ұз¬¬2еҖӢ16Г—16пјү
    if(trainingCelebrationStep === 1) lifeDragonMoveX = 32;       // з¬¬1дёӢ happy е°ұеҲ°зӣҫзүҢдҪҚзҪ®
    else if(trainingCelebrationStep >= 2) lifeDragonMoveX = 32;   // еҒңз•ҷ

    if(trainingCelebrationStep >= TRAINING_CELEBRATION_SEQ.length){
      clearInterval(trainingCelebrationTimer);
      trainingCelebrationTimer = null;
      trainingCelebrationActive = false;
      stopTraining();
      return;
    }
    renderFrame();
  }, 600);
  renderFrame();
}

// ========== зҲҶж“ҠиЁ“з·ҙеҮҪж•ё ==========
function startCriticalBar(){
  criticalPos = 0;
  criticalDirection = 1;
  criticalBarActive = true;
  criticalPaused = false;
  renderFrame();

  criticalBarTimer = setInterval(() => {
    if(!criticalBarActive) return;
    if(criticalPaused) return; // з«Ҝй»һжҡ«еҒңдёӯпјҢзӯү timeout жҒўеҫ©

    criticalPos += criticalDirection;

    if(criticalPos > 3){
      // еҲ°жңҖеҸійӮҠ (x=48)пјҢжҡ«еҒң 1 з§’еҫҢе·Ұз§»
      criticalPos = 3;
      criticalPaused = true;
      renderFrame();
      setTimeout(() => {
        criticalPaused = false;
        criticalDirection = -1;
        criticalPos = 2;
        renderFrame();
      }, 400);
      return;
    } else if(criticalPos < 0){
      // еҲ°жңҖе·ҰйӮҠ (x=0)пјҢз«ӢеҚіеҸіз§»
      criticalPos = 0;
      criticalDirection = 1;
      criticalPos = 1;
      renderFrame();
      return;
    }
    renderFrame();
  }, 150);
}

function stopCriticalBar(){
  criticalBarActive = false;
  if(criticalBarTimer){
    clearInterval(criticalBarTimer);
    criticalBarTimer = null;
  }
  if(criticalPos === 3){
    // еҒңеңЁжңҖеҸі вҶ’ жҲҗеҠҹпјҒйӣҷдёҠдёӢж”»ж“Ҡ
    startCriticalSuccessAnimation();
  } else {
    // жІ’е°Қжә– вҶ’ еӨұж•—
    if(trainingTimer){
      clearInterval(trainingTimer);
      trainingTimer = null;
    }
    document.getElementById("trainingTimerDisplay").textContent = "";
    triggerTrainingFailure();
  }
}

function startCriticalSuccessAnimation(){
  // жҲҗеҠҹпјҡйҫҚеңЁ x=32 зҷје°„йӣҷзҒ«зҗғ вҶ’ жҠөйҒ”зүҶеҫҢ BOOM вҶ’ зүҶи®Ҡ broken вҶ’ ж…¶зҘқ
  trainingAttackActive = true;
  criticalAttackStep = 16;  // зҒ«зҗғиө·е§Ӣ x дҪҚзҪ®
  criticalWallBroken = false;
  renderFrame();

  // Phase 1пјҡзҒ«зҗғеҫһ x=16 дёҖж јдёҖж јеҗ‘е·Ұз§»еӢ•еҲ°зүҶпјҲ16ms жҜҸж јпјү
  criticalAttackTimer = setInterval(() => {
    criticalAttackStep -= 1;
    if(criticalAttackStep <= 0){
      // зҒ«зҗғжҠөйҒ”зүҶпјҢеҲҮеҲ° Phase 2пјҡBOOM еӢ•з•«
      clearInterval(criticalAttackTimer);
      boomFrame = 0;
      boomCycle = 0;
      renderFrame();

      criticalAttackTimer = setInterval(() => {
        boomFrame = boomFrame === 0 ? 1 : 0;
        if(boomFrame === 0) boomCycle++;
        if(boomCycle >= 2){
          // BOOM зөҗжқҹ вҶ’ зүҶи®Ҡ broken вҶ’ ж…¶зҘқ
          clearInterval(criticalAttackTimer);
          criticalAttackTimer = null;
          criticalWallBroken = true;
          trainingAttackActive = false;
          endTrainingAttack();
          return;
        }
        renderFrame();
      }, 200);
      return;
    }
    renderFrame();
  }, 16);
}

function renderTrainingCanvas(){
  // з№ӘиЈҪиЁ“з·ҙиғҢжҷҜ (384Г—96 зӯүжҜ”з№Әж–ј 64Г—16 canvas)
  if(tbgImage.complete && tbgImage.naturalWidth > 0){
    ctx.drawImage(tbgImage, 0, 0, CANVAS_TRAIN_W, 16);
  } else {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, CANVAS_TRAIN_W, 16);
  }

  // йҫҚе№ҖйҒёж“Үпјҡж…¶зҘқ/еӨұж•—/ж”»ж“Ҡ/е№іжҷӮ
  let dragonFrame;
  if(trainingFailureActive){
    dragonFrame = TRAINING_FAILURE_SEQ[trainingFailureStep];
  } else if(trainingCelebrationActive){
    dragonFrame = TRAINING_CELEBRATION_SEQ[trainingCelebrationStep];
  } else if(trainingAttackActive && trainingType !== "life"){
    dragonFrame = 11;
  } else {
    dragonFrame = trainingIdleFrame;
  }

  if(trainingType === "life"){
    // з”ҹе‘ҪиЁ“з·ҙпјҡж №ж“ҡ lifePhase жұәе®ҡйЎҜзӨә
    // иЁҲз®—йҫҚз•¶еүҚ x дҪҚзҪ®пјҲж…¶зҘқ/еӨұж•— sad жҷӮеңЁзӣҫзүҢдҪҚзҪ® x=32пјҢе…¶йӨҳеӣәе®ҡ x=48пјү
    const lifeDragonX = (lifePhase === "celebration" || lifePhase === "failure") ? lifeDragonMoveX : 48;

    // зӣҫзүҢ / BOOM йЎҜзӨә
    if(lifePhase === "boom"){
      // йҡҺж®ө 2: BOOM еӢ•з•«иҰҶи“ӢзӣҫзүҢдҪҚзҪ®
      const bImg = boomFrame === 0 ? boomImage : boomImage2;
      if(bImg.complete && bImg.naturalWidth > 0){
        ctx.drawImage(bImg, 32, 0, 16, 16);
      }
    } else if(lifePhase === "celebration" || lifePhase === "failure"){
      // йҡҺж®ө 5: зӣҫзүҢйҡұи—ҸпјҲж…¶зҘқ / еӨұж•— SAD жҷӮпјү
    } else {
      // йҡҺж®ө play / boxing / shieldHoldпјҡйЎҜзӨәзӣҫзүҢ
      const shieldImg = lifeShieldBroken ? shieldBreakImage : shieldImage;
      if(shieldImg.complete && shieldImg.naturalWidth > 0){
        ctx.drawImage(shieldImg, 32, 0, 16, 16);
      }
      // еғ… play йҡҺж®өйЎҜзӨәеү©йӨҳ point
      if(lifePhase === "play" && !lifeShieldBroken && pointImage.complete && pointImage.naturalWidth > 0){
        const positions = [
          [32, 0], // дёҠе·Ұ
          [40, 0], // дёҠеҸі
          [32, 8], // дёӢе·Ұ
          [40, 8], // дёӢеҸі
        ];
        for(let i = 0; i < lifePointsRemaining && i < 4; i++){
          ctx.drawImage(pointImage, positions[i][0], positions[i][1], 8, 8);
        }
      }
    }

    // йЎҜзӨә boxing ең–пјҲеғ… boxing йҡҺж®өпјү
    if(lifePhase === "boxing" && boxingImage.complete && boxingImage.naturalWidth > 0){
      ctx.drawImage(boxingImage, lifeBoxingX, 0, 16, 16);
    }

    // йҫҚпјҲи·ҹйҡЁ lifeDragonXпјҢж…¶зҘқжҷӮеҫһ 48 з§»еӢ•еҲ° 32пјү
    if(rowImages[currentRow] && rowImages[currentRow].complete && rowImages[currentRow].naturalWidth > 0){
      ctx.drawImage(
        rowImages[currentRow],
        dragonFrame * PITCH, 0,
        16, 16,

    // ж…¶зҘқжҷӮ happy iconsпјҲеӣәе®ҡдҪҚзҪ® x=24, x=48пјҢиҲҮж”»ж“ҠиЁ“з·ҙзӣёеҗҢпјү

       && TRAINING_CELEBRATION_SEQ[trainingCelebrationStep] === 7){

      ctx.drawImage(happyImage, 48, 0, 8, 8);
      ctx.drawImage(happyImage, 48, 8, 8, 8);
    }
    // еӨұж•—жҷӮ sad iconsпјҲеӣәе®ҡдҪҚзҪ® x=24, x=48пјҢиҲҮж”»ж“ҠиЁ“з·ҙзӣёеҗҢпјү
    if(trainingFailureActive && sadImage.complete && sadImage.naturalWidth > 0
       && TRAINING_FAILURE_SEQ[trainingFailureStep] === 10){
      ctx.drawImage(sadImage, 24, 0, 8, 8);
      ctx.drawImage(sadImage, 24, 8, 8, 8);
      ctx.drawImage(sadImage, 48, 0, 8, 8);
      ctx.drawImage(sadImage, 48, 8, 8, 8);
    }
    return;
  }

  // зҲҶж“ҠиЁ“з·ҙпјҡйЎҜзӨә зүҶ + bar + йҫҚ
  if(trainingType === "critical"){
    // зүҶеңЁжңҖе·Ұ x=0пјҲз ҙеЈһеҫҢйЎҜзӨә Wall brokenпјү
    const wImg = criticalWallBroken ? wallBrokenImage : wallImage;

      ctx.drawImage(wImg, 0, 0, 16, 16);
    }

    // Critical Hit Bar ж”ҫеңЁжңҖеҸі x=48пјҢж №ж“ҡ criticalPos йЎҜзӨәе°ҚжҮүзҡ„ cell
    // ж…¶зҘқпјҲhappyпјүжҲ–еӨұж•—пјҲsadпјүжҷӮйҡұи—Ҹ
    if(!trainingCelebrationActive && !trainingFailureActive && criticalBarImage.complete && criticalBarImage.naturalWidth > 0){
      ctx.drawImage(criticalBarImage, criticalPos * 16, 0, 16, 16, 48, 0, 16, 16);
    }

    // жҲҗеҠҹеӢ•з•«пјҡйӣҷзҒ«зҗғ вҶ’ BOOM вҶ’ зүҶи®Ҡ broken
    if(trainingAttackActive){
      if(criticalAttackStep > 0){
        // зҒ«зҗғз§»еӢ•дёӯпјҲеҫһ x=16 дёҖж јдёҖж јеҗ‘е·ҰеҲ° x=0пјү
        if(attackProjImage.complete && attackProjImage.naturalWidth > 0){
          ctx.drawImage(attackProjImage, 0, 0, 16, 8, criticalAttackStep, 0, 16, 8);
          ctx.drawImage(attackProjImage, 0, 0, 16, 8, criticalAttackStep, 8, 16, 8);
        }
      } else {
        // зҒ«зҗғеҲ°йҒ”зүҶеЈҒпјҢBOOM еӢ•з•«иҰҶи“ӢзүҶдҪҚзҪ®
        const bImg = boomFrame === 0 ? boomImage : boomImage2;
        if(bImg.complete && bImg.naturalWidth > 0){
          ctx.drawImage(bImg, 0, 0, 16, 16);
        }
      }
      // йҫҚеңЁ x=32 ж”»ж“Ҡ
      if(rowImages[currentRow] && rowImages[currentRow].complete && rowImages[currentRow].naturalWidth > 0){
        ctx.drawImage(rowImages[currentRow], 11 * PITCH, 0, 16, 16, 32, 0, 16, 16);
      }

      // йҫҚеңЁ x=32
      if(rowImages[currentRow] && rowImages[currentRow].complete && rowImages[currentRow].naturalWidth > 0){
        ctx.drawImage(rowImages[currentRow], dragonFrame * PITCH, 0, 16, 16, 32, 0, 16, 16);
      }
    }

    // ж…¶зҘқ happy icons
    if(trainingCelebrationActive && happyImage.complete && happyImage.naturalWidth > 0
       && TRAINING_CELEBRATION_SEQ[trainingCelebrationStep] === 7){
      ctx.drawImage(happyImage, 24, 0, 8, 8);
      ctx.drawImage(happyImage, 24, 8, 8, 8);
      ctx.drawImage(happyImage, 48, 0, 8, 8);
      ctx.drawImage(happyImage, 48, 8, 8, 8);
    }
    // еӨұж•— sad icons
    if(trainingFailureActive && sadImage.complete && sadImage.naturalWidth > 0
       && TRAINING_FAILURE_SEQ[trainingFailureStep] === 10){
      ctx.drawImage(sadImage, 24, 0, 8, 8);
      ctx.drawImage(sadImage, 24, 8, 8, 8);
      ctx.drawImage(sadImage, 48, 0, 8, 8);
      ctx.drawImage(sadImage, 48, 8, 8, 8);
    }
    return;
  }

  // ж”»ж“ҠиЁ“з·ҙпјҡеҺҹдҫҶзҡ„еёғеұҖ
  // 1) жңҖе·ҰеҒҙиЁ“з·ҙйқ¶еӯҗ (x=0)пјҢдҫқзӢҖж…ӢйЎҜзӨәдёҚеҗҢең–
  if(sandbagState === "hit"){
    // иў«жү“дёӯеҫҢпјҡйЎҜзӨә Sandbag03
    if(sandbagImage3.complete && sandbagImage3.naturalWidth > 0){
      ctx.drawImage(sandbagImage3, 0, 0, 16, 16);
    }
  } else if(sandbagState === "boom"){
    // зҲҶзӮёеӢ•з•«пјҡйЎҜзӨә Boom01/Boom02
    const bImg = boomFrame === 0 ? boomImage : boomImage2;
    if(bImg.complete && bImg.naturalWidth > 0){
      ctx.drawImage(bImg, 0, 0, 16, 16);
    }
  } else {
    // жӯЈеёёзӢҖж…ӢпјҡйқңжӯўйЎҜзӨә Sandbag01
    if(sandbagImage.complete && sandbagImage.naturalWidth > 0){
      ctx.drawImage(sandbagImage, 0, 0, 16, 16);
    }
  }
  
  // 2) йҫҚеңЁдёӯй–“пјҲx=32пјү
  if(rowImages[currentRow] && rowImages[currentRow].complete && rowImages[currentRow].naturalWidth > 0){
    ctx.drawImage(
      rowImages[currentRow],
      dragonFrame * PITCH, 0,
      16, 16,
      32, 0,
      16, 16
    );
  }
  
  // ж…¶зҘқжҷӮеҸӘеңЁ happy е№ҖйЎҜзӨәж„ӣеҝғ
  if(trainingCelebrationActive && happyImage.complete && happyImage.naturalWidth > 0
     && TRAINING_CELEBRATION_SEQ[trainingCelebrationStep] === 7){
    ctx.drawImage(happyImage, 24, 0, 8, 8);
    ctx.drawImage(happyImage, 24, 8, 8, 8);
    ctx.drawImage(happyImage, 48, 0, 8, 8);
    ctx.drawImage(happyImage, 48, 8, 8, 8);
  }
  // еӨұж•—жҷӮеҸӘеңЁ sad е№ҖйЎҜзӨәйӣЈйҒҺең–
  if(trainingFailureActive && sadImage.complete && sadImage.naturalWidth > 0
     && TRAINING_FAILURE_SEQ[trainingFailureStep] === 10){
    ctx.drawImage(sadImage, 24, 0, 8, 8);
    ctx.drawImage(sadImage, 24, 8, 8, 8);
    ctx.drawImage(sadImage, 48, 0, 8, 8);
    ctx.drawImage(sadImage, 48, 8, 8, 8);
  }
  
  // Power еңЁйҫҚеҸіеҒҙпјҲx=48пјүпјҢж”»ж“Ҡе®ҢжҲҗеҫҢйҡұи—Ҹ
  if(!trainingPowerHidden){
    if(powerImage.complete && powerImage.naturalWidth > 0){
      const powerFrame = Math.min(trainingLevel, 5);
      ctx.drawImage(
        powerImage,
        powerFrame * 16, 0, 16, 16,
        48, 0,
        16, 16
      );
    } else {
      ctx.fillStyle = "#ff0";
      ctx.fillRect(49, 1, 14, 14);
    }
  }
  
  // ж”»ж“ҠеҪҲеңЁйҫҚе·Ұж–№пјҢзҒ«зҗғйҖЈзәҢз§»еӢ•пјҲзІҫйқҲ 16Г—8 з№Әж–јдёҠж–№пјү
  if(trainingAttackActive && attackProjImage.complete && attackProjImage.naturalWidth > 0){
    ctx.drawImage(attackProjImage, trainingProjectileX, 0, 16, 8);
  }
}

const SAVE_KEY = "digimon_vpet_save";
function saveGameState(){
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      gameAge,
      gameHunger,
      currentRow,
      timestamp: Date.now()
    }));
  } catch(e){ /* еҝҪз•ҘеӯҳжӘ”йҢҜиӘӨ */ }
}
function loadGameState(){
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return;
    const data = JSON.parse(raw);
    const elapsed = Math.floor((Date.now() - data.timestamp) / 60000); // з¶“йҒҺеҲҶйҗҳ
    gameAge = (data.gameAge || 0) + elapsed;
    gameHunger = Math.max(0, (data.gameHunger ?? 5) - Math.floor(elapsed / 30));
    currentRow = data.currentRow ?? 2;
  } catch(e){ /* еҝҪз•Ҙи®ҖжӘ”йҢҜиӘӨ */ }
}

  panel.innerHTML = '';

    btn.className = 'func-btn';

  const foodPanel = document.getElementById("foodDisplay");
  const s = DIGIMON_STATS[currentRow];
  if(!s) return;
  // иӢҘе·ІйЎҜзӨәеүҮй—ңй–ү
  if(panel.style.display === "block"){
    panel.style.display = "none";
    return;
  }
  // й—ңй–үе…¶д»–йқўжқҝ
  foodPanel.style.display = "none";
  document.getElementById("digidexDisplay").style.display = "none";
  document.getElementById("trainingDisplay").style.display = "none";
  const years = Math.floor(gameAge / 1440);
  const hours = Math.floor((gameAge % 1440) / 60);
  const mins = gameAge % 60;
  const hpLost = Math.max(0, Math.floor((10 - gameHunger) * s.hp / 20));
  const hearts = "вқӨпёҸ".repeat(gameHunger) + "рҹ–Ө".repeat(10 - gameHunger);
  document.getElementById("sdName").textContent = s.name;
  document.getElementById("sdAge").textContent = `${years}жӯІ:${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}`;
  document.getElementById("sdHunger").innerHTML = hearts;
  document.getElementById("sdHp").textContent = `${s.hp - hpLost} / ${s.hp}`;
  document.getElementById("sdAtk").textContent = s.atk;
  document.getElementById("sdDouble").textContent = `${s.doubleAtk}%`;
  document.getElementById("sdSpeed").textContent = s.speed;
  document.getElementById("sdEvade").textContent = `${s.evade}%`;
  panel.style.display = "block";
}

// ========== ең–й‘‘ ==========
function createMiniSprite(row, size){
  const c = document.createElement('canvas');
  c.width = 16; c.height = 16;
  const cx = c.getContext('2d');
  cx.imageSmoothingEnabled = false;
  cx.drawImage(rowImages[row], 0, 0, 16, 16, 0, 0, 16, 16);
  // иЁӯ CSS е°әеҜёпјҢдҝқжҢҒз•«зҙ ж„ҹ
  c.style.width = size + 'px';
  c.style.height = size + 'px';
  return c;
}

function showDigidex(){
  const panel = document.getElementById("digidexDisplay");
  const statsPanel = document.getElementById("statsDisplay");
  const foodPanel = document.getElementById("foodDisplay");
  if(panel.style.display === "block"){ panel.style.display = "none"; return; }
  statsPanel.style.display = "none";
  foodPanel.style.display = "none";
  document.getElementById("trainingDisplay").style.display = "none";

  const container = document.getElementById("digidexContent");
  container.innerHTML = "";
  for(const stage of DIGIDEX_STAGES){
    const stageDiv = document.createElement('div');
    stageDiv.className = 'digidex-stage';

    const title = document.createElement('div');
    title.className = 'digidex-stage-title';
    title.textContent = stage.name;
    stageDiv.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'digidex-grid';

    for(const row of stage.rows){
      const entry = document.createElement('div');
      entry.className = 'digidex-entry';
      const sprite = createMiniSprite(row, 48);
      entry.appendChild(sprite);
      const nameSpan = document.createElement('div');
      nameSpan.className = 'd-name';
      nameSpan.textContent = ALL_NAMES[row] || `row_${String(row).padStart(2,'0')}`;
      entry.appendChild(nameSpan);
      // еғ…дҫӣзҖҸиҰҪпјҢдёҚеҲҮжҸӣж•ёзўјзҚё
      grid.appendChild(entry);
    }

    stageDiv.appendChild(grid);
    container.appendChild(stageDiv);
  }

  panel.style.display = "block";
}

function feedDigimon(food){
  // й—ңй–үйЈҹзү©йқўжқҝиҲҮең–й‘‘йқўжқҝ
  document.getElementById("foodDisplay").style.display = "none";
  document.getElementById("digidexDisplay").style.display = "none";
  if(gameMode !== "auto") return; // еӢ•з•«йҖІиЎҢдёӯдёҚеҸҜж“ҚдҪң

  if(food === "meat"){
    if(gameHunger >= 10){
      // жӢ’зө•пјҡжҗ–жҷғеӢ•з•«
      gameMode = "refusing";
      gameModeStep = 0;
      if(autoMoveTimer){ clearInterval(autoMoveTimer); autoMoveTimer = null; }
      restartAnimTimer(REFUSE_IV);
      return;
    }
    gameHunger = Math.min(10, gameHunger + 1);
    // йҖІйЈҹпјҡeat1/eat2 еӢ•з•«пјҢйҫҚеңЁеҸійӮҠпјҢйЈҹзү©еҫһе·ҰеҲ°еҸі
    gameMode = "eating";
    gameModeStep = 0;
    autoX = 14;
    autoTargetX = null;
    if(autoMoveTimer){ clearInterval(autoMoveTimer); autoMoveTimer = null; }
    restartAnimTimer(EAT_IV);
    saveGameState();
    renderFrame();
    console.log(`йӨөйЈҹ: ${food}, йЈҪйЈҹеәҰ: ${gameHunger}`);
  }
}

// ========== йҒёж“Үж•ёзўјзҚёпјҲз”ұз®ӯй ӯжҺ§еҲ¶пјү ==========
function selectDigimon(idx){
  currentRow = idx;
  gameMode = "auto";
  gameModeStep = 0;
  if(autoTimer) clearInterval(autoTimer);
  if(autoMoveTimer) clearInterval(autoMoveTimer);
  autoTimer = null;
  autoMoveTimer = null;
  autoX = 16;
  autoTargetX = null;
  autoAnimStep = 0;
  renderFrame();
  startAutoPlay();
}
